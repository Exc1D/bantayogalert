              - text: "'s animated sequences from"
              - link "Monty Python's Flying Circus" [ref=e1120] [cursor=pointer]:
                - /url: /wiki/Monty_Python%27s_Flying_Circus
              - text: (UK, 1969–1974);
              - link "Fantastic Planet" [ref=e1122] [cursor=pointer]:
