          - generic [ref=e1112]:
            - term [ref=e1113]:
              - link "Cutout animation" [ref=e1114] [cursor=pointer]:
                - /url: /wiki/Cutout_animation
            - definition [ref=e1115]:
              - text: (Sometimes called paper animation) A type of stop-motion animation produced by moving two-dimensional pieces of material paper or cloth.
              - superscript [ref=e1116]:
                - link "[98]" [ref=e1117] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTELaybourne199859–60-98"
              - text: Examples include
              - link "Terry Gilliam" [ref=e1118] [cursor=pointer]:
