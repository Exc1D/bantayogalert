          - note [ref=e431]:
            - text: "Main article:"
            - link "Golden Age of American animation" [ref=e432] [cursor=pointer]:
              - /url: /wiki/Golden_Age_of_American_animation
          - paragraph [ref=e433]:
            - text: In 1928,
            - link "Steamboat Willie" [ref=e435] [cursor=pointer]:
              - /url: /wiki/Steamboat_Willie
            - text: ", featuring"
            - link "Mickey Mouse" [ref=e436] [cursor=pointer]:
              - /url: /wiki/Mickey_Mouse
            - text: and
            - link "Minnie Mouse" [ref=e437] [cursor=pointer]:
              - /url: /wiki/Minnie_Mouse
            - text: ", popularized film-with-synchronized-sound and put"
            - link "Walt Disney" [ref=e438] [cursor=pointer]:
              - /url: /wiki/Walt_Disney
            - text: "'s studio at the forefront of the animation industry. Although"
            - link "Disney Animation's" [ref=e439] [cursor=pointer]:
              - /url: /wiki/Walt_Disney_Animation_Studios
            - text: actual output relative to total global animation output has always been very small, the studio has overwhelmingly dominated the "aesthetic norms" of animation ever since.
            - superscript [ref=e440]:
              - link "[10]" [ref=e441] [cursor=pointer]:
                - /url: "#cite_note-10"
          - paragraph [ref=e442]:
            - text: The enormous success of Mickey Mouse is seen as the start of the
            - link "golden age of American animation" [ref=e443] [cursor=pointer]:
              - /url: /wiki/Golden_age_of_American_animation
            - text: that would last until the 1960s. The United States dominated the world market of animation with a plethora of cel-animated theatrical shorts.
            - superscript [ref=e444]:
              - link "[11]" [ref=e445] [cursor=pointer]:
                - /url: "#cite_note-11"
            - text: Several studios would introduce characters that would become very popular and would have long-lasting careers, including
            - link "Walt Disney Productions" [ref=e446] [cursor=pointer]:
              - /url: /wiki/Walt_Disney_Productions
            - text: "'"
            - link "Goofy" [ref=e447] [cursor=pointer]:
              - /url: /wiki/Goofy
            - text: (1932) and
            - link "Donald Duck" [ref=e448] [cursor=pointer]:
              - /url: /wiki/Donald_Duck
            - text: (1934),
            - link "Fleischer Studios" [ref=e449] [cursor=pointer]:
              - /url: /wiki/Fleischer_Studios
            - text: /
            - link "Paramount Cartoon Studios" [ref=e450] [cursor=pointer]:
              - /url: /wiki/Paramount_Cartoon_Studios
            - text: "'"
            - link "Out of the Inkwell" [ref=e451] [cursor=pointer]:
              - /url: /wiki/Out_of_the_Inkwell
            - text: "'"
            - link "Koko the Clown" [ref=e452] [cursor=pointer]:
              - /url: /wiki/Koko_the_Clown
            - text: (1918),
            - link "Bimbo" [ref=e453] [cursor=pointer]:
              - /url: /wiki/Bimbo_(Fleischer_Studios)
            - text: and
            - link "Betty Boop" [ref=e454] [cursor=pointer]:
              - /url: /wiki/Betty_Boop
            - text: (1930),
            - link "Popeye" [ref=e455] [cursor=pointer]:
              - /url: /wiki/Popeye#Theatrical_animated_cartoons
            - text: (1933) and
            - link "Casper the Friendly Ghost" [ref=e456] [cursor=pointer]:
              - /url: /wiki/Casper_the_Friendly_Ghost
            - text: (1945),
            - link "Warner Bros. Cartoon Studios" [ref=e457] [cursor=pointer]:
              - /url: /wiki/Warner_Bros._Cartoons
            - text: "'"
            - link "Looney Tunes" [ref=e458] [cursor=pointer]:
              - /url: /wiki/Looney_Tunes
            - text: "'"
            - link "Porky Pig" [ref=e459] [cursor=pointer]:
              - /url: /wiki/Porky_Pig
            - text: (1935),
            - link "Daffy Duck" [ref=e460] [cursor=pointer]:
              - /url: /wiki/Daffy_Duck
            - text: (1937),
            - link "Elmer Fudd" [ref=e461] [cursor=pointer]:
              - /url: /wiki/Elmer_Fudd
            - text: (1937–1940),
            - link "Bugs Bunny" [ref=e462] [cursor=pointer]:
              - /url: /wiki/Bugs_Bunny
            - text: (1938–1940),
            - link "Tweety" [ref=e463] [cursor=pointer]:
              - /url: /wiki/Tweety
            - text: (1942),
            - link "Sylvester the Cat" [ref=e464] [cursor=pointer]:
              - /url: /wiki/Sylvester_the_Cat
            - text: (1945),
            - link "Wile E. Coyote and the Road Runner" [ref=e465] [cursor=pointer]:
              - /url: /wiki/Wile_E._Coyote_and_the_Road_Runner
            - text: (1949),
            - link "MGM cartoon studio" [ref=e466] [cursor=pointer]:
              - /url: /wiki/Metro-Goldwyn-Mayer_cartoon_studio
            - text: "'s"
            - link "Tom and Jerry" [ref=e467] [cursor=pointer]:
              - /url: /wiki/Tom_and_Jerry
            - text: (1940) and
            - link "Droopy" [ref=e468] [cursor=pointer]:
              - /url: /wiki/Droopy
            - text: ","
            - link "Universal Cartoon Studios" [ref=e469] [cursor=pointer]:
              - /url: /wiki/Walter_Lantz_Productions
            - text: "'"
            - link "Woody Woodpecker" [ref=e470] [cursor=pointer]:
              - /url: /wiki/Woody_Woodpecker
            - text: (1940),
            - link "Terrytoons" [ref=e471] [cursor=pointer]:
              - /url: /wiki/Terrytoons
            - text: /
            - link "20th Century Fox" [ref=e472] [cursor=pointer]:
              - /url: /wiki/20th_Century_Fox
            - text: "'s"
            - link "Mighty Mouse" [ref=e473] [cursor=pointer]:
              - /url: /wiki/Mighty_Mouse
            - text: (1942), and
            - link "United Artists" [ref=e474] [cursor=pointer]:
              - /url: /wiki/United_Artists
            - text: "'"
            - link "Pink Panther" [ref=e475] [cursor=pointer]:
              - /url: /wiki/Pink_Panther_(character)
            - text: (1963).
          - generic [ref=e476]:
            - heading "Features before CGI" [level=3] [ref=e477]
            - generic [ref=e478]:
              - text: "["
              - link "edit" [ref=e479] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=7
              - text: "]"
          - figure "Italian-Argentine cartoonist Quirino Cristiani showing the cut and articulated figure of his satirical character El Peludo (based on President Yrigoyen) patented in 1916 for the realization of his films, including the world's first animated feature film El Apóstol[12]" [ref=e480]:
            - link [ref=e481] [cursor=pointer]:
              - /url: /wiki/File:Quirino_Cristiani_con_una_figura.jpg
              - img [ref=e482]
            - generic [ref=e483]:
              - text: Italian-Argentine cartoonist
              - link "Quirino Cristiani" [ref=e484] [cursor=pointer]:
                - /url: /wiki/Quirino_Cristiani
              - text: showing the cut and articulated figure of his satirical character El Peludo (based on President
              - link "Yrigoyen" [ref=e485] [cursor=pointer]:
                - /url: /wiki/Hip%C3%B3lito_Yrigoyen
              - text: ) patented in 1916 for the realization of his films, including the world's first animated feature film
              - link "El Apóstol" [ref=e487] [cursor=pointer]:
                - /url: /wiki/El_Ap%C3%B3stol
              - superscript [ref=e488]:
                - link "[12]" [ref=e489] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEBendazzi199449-12"
          - paragraph [ref=e490]:
            - text: In 1917, Italian-Argentine director
            - link "Quirino Cristiani" [ref=e491] [cursor=pointer]:
              - /url: /wiki/Quirino_Cristiani
            - text: made the first feature-length film
            - link "El Apóstol" [ref=e493] [cursor=pointer]:
              - /url: /wiki/El_Ap%C3%B3stol
            - text: (now
            - link "lost" [ref=e494] [cursor=pointer]:
              - /url: /wiki/Lost_film
            - text: ), which became a critical and commercial success. It was followed by Cristiani's
            - link "Sin dejar rastros" [ref=e496] [cursor=pointer]:
              - /url: /wiki/Sin_dejar_rastros
            - text: in 1918, but one day after its premiere, the film was confiscated by the government.
            - superscript [ref=e497]:
              - link "[13]" [ref=e498] [cursor=pointer]:
                - /url: "#cite_note-13"
          - paragraph [ref=e499]:
            - text: After working on it for three years,
            - link "Lotte Reiniger" [ref=e500] [cursor=pointer]:
              - /url: /wiki/Lotte_Reiniger
            - text: released the German feature-length
            - link "silhouette animation" [ref=e501] [cursor=pointer]:
              - /url: /wiki/Silhouette_animation
            - link "Die Abenteuer des Prinzen Achmed" [ref=e503] [cursor=pointer]:
              - /url: /wiki/Die_Abenteuer_des_Prinzen_Achmed
            - text: in 1926, the oldest extant animated feature.
            - superscript [ref=e504]:
              - link "[14]" [ref=e505] [cursor=pointer]:
                - /url: "#cite_note-14"
          - paragraph [ref=e506]:
            - text: In 1937,
            - link "Walt Disney Studios" [ref=e507] [cursor=pointer]:
              - /url: /wiki/Walt_Disney_Animation_Studios
            - text: premiered their first animated feature
            - link "Snow White and the Seven Dwarfs" [ref=e509] [cursor=pointer]:
              - /url: /wiki/Snow_White_and_the_Seven_Dwarfs_(1937_film)
            - text: ", still one of the highest-grossing traditional animation features as of May 2020 ."
            - superscript [ref=e510]:
              - link "[15]" [ref=e511] [cursor=pointer]:
                - /url: "#cite_note-15"
            - superscript [ref=e512]:
              - link "[16]" [ref=e513] [cursor=pointer]:
                - /url: "#cite_note-16"
            - text: The Fleischer studios followed this example in 1939 with
            - link "Gulliver's Travels" [ref=e515] [cursor=pointer]:
              - /url: /wiki/Gulliver%27s_Travels_(1939_film)
            - text: with some success. Partly due to foreign markets being cut off by the Second World War, Disney's next features
            - link "Pinocchio" [ref=e517] [cursor=pointer]:
              - /url: /wiki/Pinocchio_(1940_film)
            - text: ","
            - link "Fantasia" [ref=e519] [cursor=pointer]:
              - /url: /wiki/Fantasia_(1940_film)
            - text: (both 1940), Fleischer Studios' second animated feature
            - link "Mr. Bug Goes to Town" [ref=e521] [cursor=pointer]:
              - /url: /wiki/Mr._Bug_Goes_to_Town
            - text: (1941–1942) failed at the box office. For several decades, Disney was the only American studio to regularly produce animated features, until
            - link "Ralph Bakshi" [ref=e522] [cursor=pointer]:
              - /url: /wiki/Ralph_Bakshi
            - text: became the first to release more than a handful of features.
            - link "Sullivan-Bluth Studios" [ref=e523] [cursor=pointer]:
              - /url: /wiki/Sullivan-Bluth_Studios
            - text: began to regularly produce animated features starting with
            - link "An American Tail" [ref=e525] [cursor=pointer]:
              - /url: /wiki/An_American_Tail
            - text: in 1986.
            - superscript [ref=e526]:
              - link "[17]" [ref=e527] [cursor=pointer]:
                - /url: "#cite_note-17"
          - paragraph [ref=e528]:
            - text: Although relatively few titles became as successful as Disney's features, other countries developed their own animation industries that produced both short and feature theatrical animations in a wide variety of styles, relatively often including
            - link "stop motion" [ref=e529] [cursor=pointer]:
              - /url: /wiki/Stop_motion
            - text: and
            - link "cutout animation" [ref=e530] [cursor=pointer]:
              - /url: /wiki/Cutout_animation
            - text: techniques. Soviet
            - link "Soyuzmultfilm" [ref=e531] [cursor=pointer]:
              - /url: /wiki/Soyuzmultfilm
            - text: animation studio, founded in 1936, produced 20 films (including shorts) per year on average and reached 1,582 titles in 2018. China, Czechoslovakia / Czech Republic, Italy, France, and Belgium were other countries that more than occasionally released feature films.
          - generic [ref=e532]:
            - heading "Television" [level=3] [ref=e533]
            - generic [ref=e534]:
              - text: "["
              - link "edit" [ref=e535] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=8
              - text: "]"
          - paragraph [ref=e536]:
            - text: Animation became very popular on television since the 1950s, when television sets started to become common in most developed countries. Cartoons were mainly programmed for children, on convenient time slots, and especially US youth spent many hours watching
            - link "Saturday-morning cartoons" [ref=e537] [cursor=pointer]:
              - /url: /wiki/Saturday-morning_cartoon
            - text: . Many classic cartoons found a new life on the small screen and by the end of the 1950s, the production of new animated cartoons started to shift from theatrical releases to TV series.
            - link "Hanna-Barbera Productions" [ref=e538] [cursor=pointer]:
              - /url: /wiki/Hanna-Barbera_Productions
            - text: was especially prolific and had huge hit series, such as
            - link "The Flintstones" [ref=e540] [cursor=pointer]:
              - /url: /wiki/The_Flintstones
            - text: (1960–1966) (the first
            - link "prime time" [ref=e541] [cursor=pointer]:
              - /url: /wiki/Prime_time
            - text: animated series),
            - link "Scooby-Doo" [ref=e543] [cursor=pointer]:
              - /url: /wiki/Scooby-Doo
            - text: (since 1969) and Belgian co-production
            - link "The Smurfs" [ref=e545] [cursor=pointer]:
              - /url: /wiki/The_Smurfs_(1981_TV_series)
            - text: (1981–1989). The constraints of American television programming and the demand for an enormous quantity resulted in cheaper and quicker
            - link "limited animation" [ref=e546] [cursor=pointer]:
              - /url: /wiki/Limited_animation
            - text: methods and much more formulaic scripts. Quality dwindled until more daring animation surfaced in the late 1980s and in the early 1990s with hit series, the first cartoon of
            - link "The Simpsons" [ref=e547] [cursor=pointer]:
              - /url: /wiki/The_Simpsons_shorts
            - text: (1987), which later developed into
            - link "its own show" [ref=e548] [cursor=pointer]:
              - /url: /wiki/The_Simpsons
            - text: (in 1989) and
            - link "SpongeBob SquarePants" [ref=e550] [cursor=pointer]:
              - /url: /wiki/SpongeBob_SquarePants
            - text: (since 1999) as part of a "renaissance" of American animation.
            - superscript [ref=e551]:
              - link "[18]" [ref=e552] [cursor=pointer]:
                - /url: "#cite_note-18"
          - paragraph [ref=e553]:
            - text: While US animated series also spawned successes internationally, many other countries produced their own child-oriented programming, relatively often preferring
            - link "stop motion" [ref=e554] [cursor=pointer]:
              - /url: /wiki/Stop_motion
            - text: and
            - link "puppetry" [ref=e555] [cursor=pointer]:
              - /url: /wiki/Puppetry
            - text: over cel animation. Japanese
            - link "anime" [ref=e556] [cursor=pointer]:
              - /url: /wiki/Anime
            - text: TV series became very successful internationally since the 1960s, and European producers looking for affordable cel animators relatively often started co-productions with Japanese studios, resulting in hit series such as
            - link "Barbapapa" [ref=e558] [cursor=pointer]:
              - /url: /wiki/Barbapapa
            - text: (The Netherlands/Japan/France 1973–1977),
            - link "Wickie und die starken Männer/小さなバイキング ビッケ (Vicky the Viking)" [ref=e560] [cursor=pointer]:
              - /url: /wiki/Vicky_the_Viking
            - text: (Austria/Germany/Japan 1974),
            - link "Maya the Honey Bee" [ref=e562] [cursor=pointer]:
              - /url: /wiki/Maya_the_Honey_Bee
            - text: (Japan/Germany 1975) and
            - link "The Jungle Book" [ref=e564] [cursor=pointer]:
              - /url: /wiki/The_Jungle_Book_(1989_TV_series)
            - text: (Italy/Japan 1989).
            - superscript [ref=e565]:
              - text: "["
              - link "citation needed" [ref=e567] [cursor=pointer]:
                - /url: /wiki/Wikipedia:Citation_needed
              - text: "]"
          - generic [ref=e568]:
            - heading "Switch from cels to computers" [level=3] [ref=e569]
            - generic [ref=e570]:
              - text: "["
              - link "edit" [ref=e571] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=9
              - text: "]"
          - note [ref=e572]:
            - text: "Main article:"
            - link "History of computer animation" [ref=e573] [cursor=pointer]:
              - /url: /wiki/History_of_computer_animation
          - paragraph [ref=e574]:
            - link "Computer animation" [ref=e575] [cursor=pointer]:
              - /url: /wiki/Computer_animation
            - text: was gradually developed since the 1940s. 3D wireframe animation started popping up in the mainstream in the 1970s, with an early (short) appearance in the sci-fi thriller
            - link "Futureworld" [ref=e577] [cursor=pointer]:
              - /url: /wiki/Futureworld
            - text: (1976).
            - superscript [ref=e578]:
              - link "[19]" [ref=e579] [cursor=pointer]:
                - /url: "#cite_note-19"
          - paragraph [ref=e580]:
            - link "The Rescuers Down Under" [ref=e582] [cursor=pointer]:
              - /url: /wiki/The_Rescuers_Down_Under
            - text: was the first feature film to be completely created digitally without a camera.
            - superscript [ref=e583]:
              - link "[20]" [ref=e584] [cursor=pointer]:
                - /url: "#cite_note-20"
            - text: It was produced using the
            - link "Computer Animation Production System" [ref=e585] [cursor=pointer]:
              - /url: /wiki/Computer_Animation_Production_System
            - text: (CAPS), developed by
            - link "Pixar" [ref=e586] [cursor=pointer]:
              - /url: /wiki/Pixar
            - text: in collaboration with
            - link "The Walt Disney Company" [ref=e587] [cursor=pointer]:
              - /url: /wiki/The_Walt_Disney_Company
            - text: in the late 1980s, in a style similar to traditional cel animation.
            - superscript [ref=e588]:
              - link "[21]" [ref=e589] [cursor=pointer]:
                - /url: "#cite_note-21"
            - superscript [ref=e590]:
              - link "[22]" [ref=e591] [cursor=pointer]:
                - /url: "#cite_note-22"
            - superscript [ref=e592]:
              - link "[23]" [ref=e593] [cursor=pointer]:
                - /url: "#cite_note-23"
          - paragraph [ref=e594]:
            - text: The so-called 3D style, more often associated with computer animation, became the dominant technique following the success of Pixar's
            - link "Toy Story" [ref=e596] [cursor=pointer]:
              - /url: /wiki/Toy_Story
            - text: (1995), the first computer-animated feature in this style.
            - superscript [ref=e597]:
              - link "[24]" [ref=e598] [cursor=pointer]:
                - /url: "#cite_note-24"
          - paragraph [ref=e599]:
            - text: Most of the cel animation studios switched to producing mostly computer-animated films around the 1990s, as it proved cheaper and more profitable. Not only the very popular 3D animation style was generated with computers, but also most of the films and series with a more traditional hand-crafted appearance, in which the charming characteristics of cel animation could be emulated with software, while new digital tools helped developing new styles and effects.
            - superscript [ref=e600]:
              - link "[25]" [ref=e601] [cursor=pointer]:
                - /url: "#cite_note-25"
            - superscript [ref=e602]:
              - link "[26]" [ref=e603] [cursor=pointer]:
                - /url: "#cite_note-26"
            - superscript [ref=e604]:
              - link "[27]" [ref=e605] [cursor=pointer]:
                - /url: "#cite_note-27"
            - superscript [ref=e606]:
              - link "[28]" [ref=e607] [cursor=pointer]:
                - /url: "#cite_note-28"
            - superscript [ref=e608]:
              - link "[29]" [ref=e609] [cursor=pointer]:
                - /url: "#cite_note-29"
            - superscript [ref=e610]:
              - link "[30]" [ref=e611] [cursor=pointer]:
                - /url: "#cite_note-30"
          - generic [ref=e612]:
            - heading "Economic status" [level=2] [ref=e613]
            - generic [ref=e614]:
              - text: "["
              - link "edit" [ref=e615] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=10
              - text: "]"
          - paragraph [ref=e616]:
            - text: In 2010, the animation market was estimated to be worth circa US$80 billion.
            - superscript [ref=e617]:
              - link "[31]" [ref=e618] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEBoard_of_Investments2009-31"
            - text: By 2021, the value had increased to an estimated US$370 billion.
            - superscript [ref=e619]:
              - link "[32]" [ref=e620] [cursor=pointer]:
                - /url: "#cite_note-32"
            - text: Animated feature-length films returned the highest
            - link "gross margins" [ref=e621] [cursor=pointer]:
              - /url: /wiki/Gross_margin
            - text: (around 52%) of all
            - link "film genres" [ref=e622] [cursor=pointer]:
              - /url: /wiki/Film_genre
            - text: between 2004 and 2013.
            - superscript [ref=e623]:
              - link "[33]" [ref=e624] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMcDuling2014-33"
            - text: Animation as an art and industry continues to thrive as of the early 2020s.
            - superscript [ref=e625]:
              - link "[34]" [ref=e626] [cursor=pointer]:
                - /url: "#cite_note-34"
            - superscript [ref=e627]:
              - link "[35]" [ref=e628] [cursor=pointer]:
                - /url: "#cite_note-35"
            - superscript [ref=e629]:
              - link "[36]" [ref=e630] [cursor=pointer]:
                - /url: "#cite_note-36"
          - generic [ref=e631]:
            - heading "Education, propaganda and commercials" [level=2] [ref=e632]: Education, propaganda and commercials
            - generic [ref=e633]:
              - text: "["
              - link "edit" [ref=e634] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=11
              - text: "]"
          - paragraph [ref=e635]:
            - text: The clarity of animation makes it a powerful tool for instruction, while its total malleability also allows exaggeration that can be employed to convey strong emotions and to thwart reality. It has therefore been widely used for other purposes than mere entertainment.
            - superscript [ref=e636]:
              - link "[37]" [ref=e637] [cursor=pointer]:
                - /url: "#cite_note-37"
          - paragraph [ref=e638]:
            - text: During World War II, animation was widely exploited for propaganda.
            - link "Many American studios" [ref=e639] [cursor=pointer]:
              - /url: /wiki/World_War_II_and_American_animation
            - text: ", including Warner Bros. and Disney, lent their talents and their cartoon characters to convey to the public certain war values. These efforts extended to other countries well into the"
            - link "Cold War" [ref=e640] [cursor=pointer]:
              - /url: /wiki/Cold_War
            - text: era, particularly as it pertained to "combatting" communism. For example, the English
            - link "1954 adaptation" [ref=e641] [cursor=pointer]:
              - /url: /wiki/Animal_Farm_(1954_film)
            - text: of
            - link "George Orwell's" [ref=e642] [cursor=pointer]:
              - /url: /wiki/George_Orwell
            - link "Animal Farm" [ref=e644] [cursor=pointer]:
              - /url: /wiki/Animal_Farm
            - text: (the nation's first feature-length animated film) is speculated to have had its production funded by the CIA.
            - superscript [ref=e645]:
              - link "[38]" [ref=e646] [cursor=pointer]:
                - /url: "#cite_note-38"
            - superscript [ref=e647]:
              - link "[39]" [ref=e648] [cursor=pointer]:
                - /url: "#cite_note-39"
          - paragraph [ref=e649]:
            - text: Animation has been very popular in television commercials, both due to its graphic appeal, and the humour it can provide. Some animated characters in commercials have survived for decades, such as
            - link "Snap, Crackle and Pop" [ref=e650] [cursor=pointer]:
              - /url: /wiki/Snap,_Crackle_and_Pop
            - text: in advertisements for Kellogg's cereals.
            - superscript [ref=e651]:
              - link "[40]" [ref=e652] [cursor=pointer]:
                - /url: "#cite_note-40"
            - link "Tex Avery" [ref=e653] [cursor=pointer]:
              - /url: /wiki/Tex_Avery
            - text: was the producer of the first
            - link "Raid" [ref=e654] [cursor=pointer]:
              - /url: /wiki/Raid_(insecticide)
            - text: "\""
            - link "Kills Bugs Dead" [ref=e655] [cursor=pointer]:
              - /url: /wiki/Kills_Bugs_Dead
            - text: "\" commercials in 1966, which were very successful for the company."
            - superscript [ref=e656]:
              - link "[41]" [ref=e657] [cursor=pointer]:
                - /url: "#cite_note-41"
          - generic [ref=e658]:
            - heading "Other media, merchandise and theme parks" [level=2] [ref=e659]: Other media, merchandise and theme parks
            - generic [ref=e660]:
              - text: "["
              - link "edit" [ref=e661] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=12
              - text: "]"
          - paragraph [ref=e662]: Apart from their success in movie theaters and television series, many cartoon characters would also prove lucrative when licensed for all kinds of merchandise and for other media.
          - paragraph [ref=e663]:
            - text: Animation has traditionally been very closely related to
            - link "comic books" [ref=e664] [cursor=pointer]:
              - /url: /wiki/Comic_book
            - text: . While many comic book characters found their way to the screen (which is often the case in Japan, where many
            - link "manga" [ref=e665] [cursor=pointer]:
              - /url: /wiki/Manga
            - text: are adapted into
            - link "anime" [ref=e666] [cursor=pointer]:
              - /url: /wiki/Anime
            - text: ), original animated characters also commonly appear in comic books and magazines. Somewhat similarly, characters and plots for
            - link "video games" [ref=e667] [cursor=pointer]:
              - /url: /wiki/Video_game
            - text: (an interactive form of animation that became its own medium) have been derived from films and vice versa.
            - superscript [ref=e668]:
              - link "[42]" [ref=e669] [cursor=pointer]:
                - /url: "#cite_note-42"
          - paragraph [ref=e670]:
            - text: While very many animation companies commercially exploit their creations outside moving image media,
            - link "The Walt Disney Company" [ref=e671] [cursor=pointer]:
              - /url: /wiki/The_Walt_Disney_Company
            - text: is the best known and most extreme example. Since first being licensed for a children's writing tablet in 1929, their
            - link "Mickey Mouse" [ref=e672] [cursor=pointer]:
              - /url: /wiki/Mickey_Mouse
            - text: mascot has been
            - link "depicted on an enormous amount of products" [ref=e673] [cursor=pointer]:
              - /url: /wiki/Mickey_Mouse#Merchandising
            - text: ", as have many other Disney characters. This may have influenced some"
            - link "pejorative use of Mickey's name" [ref=e674] [cursor=pointer]:
              - /url: /wiki/Mickey_Mouse#Pejorative_use_of_Mickey's_name
            - text: ", but"
            - link "licensed Disney products" [ref=e675] [cursor=pointer]:
              - /url: /wiki/Disney_Consumer_Products
            - text: sell well, and the so-called
            - link "Disneyana" [ref=e676] [cursor=pointer]:
              - /url: /wiki/Disneyana
            - text: has many avid collectors, and even a dedicated
            - link "Disneyana Fan Club" [ref=e677] [cursor=pointer]:
              - /url: /wiki/Disneyana_Fan_Club
            - text: (since 1984).
            - superscript [ref=e678]:
              - link "[43]" [ref=e679] [cursor=pointer]:
                - /url: "#cite_note-43"
          - paragraph [ref=e680]:
            - link "Disneyland" [ref=e681] [cursor=pointer]:
              - /url: /wiki/Disneyland
            - text: opened in 1955 and features many attractions that were based on Disney's cartoon characters. Its enormous success spawned several other
            - link "Disney theme parks and resorts" [ref=e682] [cursor=pointer]:
              - /url: /wiki/Disney_Experiences#Disney_resorts
            - text: .
            - link "Disney's earnings" [ref=e683] [cursor=pointer]:
              - /url: /wiki/The_Walt_Disney_Company#Financial_data
            - text: from the theme parks have relatively often been higher than those from their movies.
          - generic [ref=e684]:
            - heading "Awards" [level=2] [ref=e685]
            - generic [ref=e686]:
              - text: "["
              - link "edit" [ref=e687] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=13
              - text: "]"
          - note [ref=e688]:
            - text: "Main article:"
            - link "List of animation awards" [ref=e689] [cursor=pointer]:
              - /url: /wiki/List_of_animation_awards
          - paragraph [ref=e690]:
            - text: As with any other form of media, animation has instituted awards for excellence in the field. Many are part of general or regional film award programs, like the China's
            - link "Golden Rooster Award" [ref=e691] [cursor=pointer]:
              - /url: /wiki/Golden_Rooster_Awards
            - text: for
            - link "Best Animation" [ref=e692] [cursor=pointer]:
              - /url: /wiki/Golden_Rooster_Award_for_Best_Animation
            - text: (since 1981). Awards programs dedicated to animation, with many categories, include
            - link "ASIFA-Hollywood" [ref=e693] [cursor=pointer]:
              - /url: /wiki/ASIFA-Hollywood
            - text: "'s"
            - link "Annie Awards" [ref=e694] [cursor=pointer]:
              - /url: /wiki/Annie_Awards
            - text: ", the"
            - link "Emile Awards" [ref=e695] [cursor=pointer]:
              - /url: /wiki/Emile_Awards
            - text: in Europe and the
            - link "Anima Mundi" [ref=e696] [cursor=pointer]:
              - /url: /wiki/Anima_Mundi_(event)
            - text: awards in Brazil.
            - superscript [ref=e697]:
              - link "[44]" [ref=e698] [cursor=pointer]:
                - /url: "#cite_note-44"
            - superscript [ref=e699]:
              - link "[45]" [ref=e700] [cursor=pointer]:
                - /url: "#cite_note-45"
            - superscript [ref=e701]:
              - link "[46]" [ref=e702] [cursor=pointer]:
                - /url: "#cite_note-46"
          - generic [ref=e703]:
            - heading "Academy Awards" [level=3] [ref=e704]
            - generic [ref=e705]:
              - text: "["
              - link "edit" [ref=e706] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=14
              - text: "]"
          - note [ref=e707]:
            - text: "Main article:"
            - link "List of animated feature films nominated for Academy Awards" [ref=e708] [cursor=pointer]:
              - /url: /wiki/List_of_animated_feature_films_nominated_for_Academy_Awards
          - paragraph [ref=e709]:
            - text: Apart from
            - link "Academy Awards" [ref=e710] [cursor=pointer]:
              - /url: /wiki/Academy_Awards
            - text: for
            - link "Best Animated Short Film" [ref=e711] [cursor=pointer]:
              - /url: /wiki/Academy_Award_for_Best_Animated_Short_Film
            - text: (since 1932) and
            - link "Best Animated Feature" [ref=e712] [cursor=pointer]:
              - /url: /wiki/Academy_Award_for_Best_Animated_Feature
            - text: (since 2002), animated movies have been nominated and rewarded in other categories, relatively often for
            - link "Best Original Song" [ref=e713] [cursor=pointer]:
              - /url: /wiki/Academy_Award_for_Best_Original_Song
            - text: and
            - link "Best Original Score" [ref=e714] [cursor=pointer]:
              - /url: /wiki/Academy_Award_for_Best_Original_Score
            - text: .
          - paragraph [ref=e715]:
            - link "Beauty and the Beast" [ref=e717] [cursor=pointer]:
              - /url: /wiki/Beauty_and_the_Beast_(1991_film)
            - text: was the first animated film nominated for
            - link "Best Picture" [ref=e718] [cursor=pointer]:
              - /url: /wiki/Academy_Award_for_Best_Picture
            - text: ", in 1991."
            - link "Up" [ref=e720] [cursor=pointer]:
              - /url: /wiki/Up_(2009_film)
            - text: (2009) and
            - link "Toy Story 3" [ref=e722] [cursor=pointer]:
              - /url: /wiki/Toy_Story_3
            - text: (2010) also received Best Picture nominations, after the academy expanded the number of nominees from five to ten.
            - superscript [ref=e723]:
              - link "[47]" [ref=e724] [cursor=pointer]:
                - /url: "#cite_note-47"
          - generic [ref=e725]:
            - heading "Production" [level=2] [ref=e726]
            - generic [ref=e727]:
              - text: "["
              - link "edit" [ref=e728] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=15
              - text: "]"
          - figure "Joy & Heron" [ref=e729]:
            - button "Play video" [ref=e733] [cursor=pointer]
            - link:
              - /url: /wiki/File:Joy_%26_Heron_-_Animated_CGI_Spot_by_Passion_Pictures.webm
            - generic [ref=e735]: Joy & Heron
          - paragraph [ref=e736]:
            - text: The creation of non-trivial animation works (i.e., longer than a few seconds) has developed as a form of
            - link "filmmaking" [ref=e737] [cursor=pointer]:
              - /url: /wiki/Filmmaking
            - text: ", with certain unique aspects."
            - superscript [ref=e738]:
              - link "[48]" [ref=e739] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTELaybourne1998117-48"
            - text: Traits common to both live-action and animated
            - link "feature films" [ref=e740] [cursor=pointer]:
              - /url: /wiki/Feature_film
            - text: are labor intensity and high production costs.
            - superscript [ref=e741]:
              - link "[49]" [ref=e742] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTESolomon1989274-49"
          - paragraph [ref=e743]:
            - text: The most important difference is that once a film is in the production phase, the
            - link "marginal cost" [ref=e744] [cursor=pointer]:
              - /url: /wiki/Marginal_cost
            - text: of one more shot is higher for animated films than live-action films.
            - superscript [ref=e745]:
              - link "[50]" [ref=e746] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEWhite2006151-50"
            - text: It is relatively easy for a director to ask for one more
            - link "take" [ref=e747] [cursor=pointer]:
              - /url: /wiki/Take
            - text: during
            - link "principal photography" [ref=e748] [cursor=pointer]:
              - /url: /wiki/Principal_photography
            - text: of a live-action film, but every take on an animated film must be manually rendered by animators (although the task of rendering slightly different takes has been made less tedious by modern computer animation).
            - superscript [ref=e749]:
              - link "[51]" [ref=e750] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTELaybourne1998339-51"
            - text: It is pointless for a studio to pay the salaries of dozens of animators to spend weeks creating a visually dazzling five-minute scene if that scene fails to effectively advance the plot of the film.
            - superscript [ref=e751]:
              - link "[52]" [ref=e752] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTECulhane199055-52"
            - text: Thus, animation studios starting with Disney began the practice in the 1930s of maintaining story departments where
            - link "storyboard artists" [ref=e753] [cursor=pointer]:
              - /url: /wiki/Storyboard_artist
            - text: develop every single scene through
            - link "storyboards" [ref=e754] [cursor=pointer]:
              - /url: /wiki/Storyboard
            - text: ", then handing the film over to the animators only after the production team is satisfied that all the scenes make sense as a whole."
            - superscript [ref=e755]:
              - link "[53]" [ref=e756] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTESolomon1989120-53"
            - text: While live-action films are now also storyboarded, they enjoy more latitude to depart from storyboards (i.e., real-time improvisation).
            - superscript [ref=e757]:
              - text: "["
              - link "citation needed" [ref=e759] [cursor=pointer]:
                - /url: /wiki/Wikipedia:Citation_needed
              - text: "]"
            - superscript [ref=e760]:
              - link "[54]" [ref=e761] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTELaybourne1998100–01-54"
          - paragraph [ref=e762]:
            - text: Another problem unique to animation is the requirement to maintain a film's consistency from start to finish, even as films have grown longer and teams have grown larger. Animators, like all artists, necessarily have individual styles, but must subordinate their individuality in a consistent way to whatever style is employed on a particular film.
            - superscript [ref=e763]:
              - link "[55]" [ref=e764] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTECanemaker1996xi–xii-55"
            - superscript [ref=e765]:
              - link "[56]" [ref=e766] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMasson200794-56"
            - text: Since the early 1980s, teams of about 500 to 600 people, of whom 50 to 70 are animators, typically have created feature-length animated films. It is relatively easy for two or three artists to match their styles; synchronizing those of dozens of artists is more difficult.
            - superscript [ref=e767]:
              - link "[57]" [ref=e768] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEBeck200437-57"
          - paragraph [ref=e769]:
            - text: This problem is usually solved by having a separate group of visual development artists develop an overall look and palette for each film before the animation begins.
            - superscript [ref=e770]:
              - link "[55]" [ref=e771] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTECanemaker1996xi–xii-55"
            - text: While animators must "sacrifice their personal drawing styles so that the work of many hands appears to be that of one", visual development artists are allowed to "create new worlds, new characters, and new entertainment possibilities in their own individualistic graphic styles".
            - superscript [ref=e772]:
              - link "[55]" [ref=e773] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTECanemaker1996xi–xii-55"
            - text: Character designers on the visual development team draw
            - link "model sheets" [ref=e774] [cursor=pointer]:
              - /url: /wiki/Model_sheet
            - text: to show how each character should look like with different facial expressions, posed in different positions, and viewed from different angles.
            - superscript [ref=e775]:
              - link "[58]" [ref=e776] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEWilliams200134-58"
            - superscript [ref=e777]:
              - link "[59]" [ref=e778] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTECulhane1990146-59"
            - text: On traditionally animated projects,
            - link "maquettes" [ref=e779] [cursor=pointer]:
              - /url: /wiki/Maquette
            - text: were often sculpted to further help the animators see how characters would look from different angles.
            - superscript [ref=e780]:
              - link "[58]" [ref=e781] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEWilliams200134-58"
            - superscript [ref=e782]:
              - link "[60]" [ref=e783] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEWilliams200152–57-60"
          - paragraph [ref=e784]:
            - text: Unlike live-action films, animated films were traditionally developed beyond the synopsis stage through the storyboard format; the storyboard artists would then receive credit for writing the film.
            - superscript [ref=e785]:
              - link "[61]" [ref=e786] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTELaybourne199899–100-61"
            - superscript [ref=e787]:
              - link "[62]" [ref=e788] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMarx20073–4-62"
            - text: The traditional approach worked for several decades because prior to the 1960s, no one except Disney was attempting to regularly produce feature-length animated films.
            - superscript [ref=e789]:
              - link "[62]" [ref=e790] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMarx20073–4-62"
            - text: All other animation studios, with occasional exceptions, were producing
            - link "short films" [ref=e791] [cursor=pointer]:
              - /url: /wiki/Short_film
            - text: only a few minutes in length.
            - superscript [ref=e792]:
              - link "[62]" [ref=e793] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMarx20073–4-62"
            - text: For short films, it was enough for the storyboard artists to work up a few
            - link "visual gags" [ref=e794] [cursor=pointer]:
              - /url: /wiki/Visual_gag
            - text: and then string them together to form a crude plot.
            - superscript [ref=e795]:
              - link "[62]" [ref=e796] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMarx20073–4-62"
          - paragraph [ref=e797]:
            - text: In 1960,
            - link "Hanna-Barbera" [ref=e798] [cursor=pointer]:
              - /url: /wiki/Hanna-Barbera
            - text: pioneered the longer
            - link "animated sitcom" [ref=e799] [cursor=pointer]:
              - /url: /wiki/Animated_sitcom
            - text: format for television with
            - link "The Flintstones" [ref=e801] [cursor=pointer]:
              - /url: /wiki/The_Flintstones
            - text: .
            - superscript [ref=e802]:
              - link "[62]" [ref=e803] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMarx20073–4-62"
            - text: Hanna-Barbera and the other early television animation studios soon discovered that storyboarding was far too inefficient to fill up a half-hour episode on the extremely tight budgets typical of television.
            - superscript [ref=e804]:
              - link "[62]" [ref=e805] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMarx20073–4-62"
            - text: "During the 1960s, these studios experimented with a more efficient method for developing story material: a"
            - link "screenwriter" [ref=e806] [cursor=pointer]:
              - /url: /wiki/Screenwriter
            - text: is hired to draft a written
            - link "screenplay" [ref=e807] [cursor=pointer]:
              - /url: /wiki/Screenplay
            - text: which is approved and handed over to the storyboard artists for storyboarding.
            - superscript [ref=e808]:
              - link "[62]" [ref=e809] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMarx20073–4-62"
            - text: This method creates significant tension between screenwriters and storyboard artists, in that some artists feel that people who cannot draw should not be writing for animation, while some writers feel that artists do not understand how to write.
            - superscript [ref=e810]:
              - link "[62]" [ref=e811] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMarx20073–4-62"
            - text: Despite that tension, it has become and remains the dominant method by which animation studios develop both feature-length films and television shows.
            - superscript [ref=e812]:
              - link "[62]" [ref=e813] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMarx20073–4-62"
          - paragraph [ref=e814]:
            - text: Ironically, the Disney studio was relatively slow to adopt this method. The first Disney feature animated film to have a complete screenplay written and approved before storyboarding was
            - link "One Hundred and One Dalmatians" [ref=e816] [cursor=pointer]:
              - /url: /wiki/One_Hundred_and_One_Dalmatians
            - text: (1961).
            - superscript [ref=e817]:
              - link "[63]" [ref=e818] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEPeriDocter2024195-63"
            - text: However, 101 Dalmatians was "a short-lived experiment"; the next Disney film to follow this method was
            - link "The Great Mouse Detective" [ref=e820] [cursor=pointer]:
              - /url: /wiki/The_Great_Mouse_Detective
            - text: (1986).
            - superscript [ref=e821]:
              - link "[63]" [ref=e822] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEPeriDocter2024195-63"
          - paragraph [ref=e823]:
            - text: Finally, another key difference is that actors traditionally record vocal tracks for animated films in separate individual sessions; they often meet one another for the first time only at the film's
            - link "premiere" [ref=e824] [cursor=pointer]:
              - /url: /wiki/Premiere
            - text: .
            - superscript [ref=e825]:
              - link "[64]" [ref=e826] [cursor=pointer]:
                - /url: "#cite_note-Hayes-2013-64"
            - text: Actors usually schedule sessions in the
            - link "recording studio" [ref=e827] [cursor=pointer]:
              - /url: /wiki/Recording_studio
            - text: around their live-action work.
            - superscript [ref=e828]:
              - link "[64]" [ref=e829] [cursor=pointer]:
                - /url: "#cite_note-Hayes-2013-64"
            - text: In live-action filmmaking, it is very common for actors to drop out of projects due to scheduling conflicts, while in animation, recording actors separately makes it possible to "get a lot more stars into one movie than" would be possible if those actors needed to be physically present on the same set at the same time.
            - superscript [ref=e830]:
              - link "[64]" [ref=e831] [cursor=pointer]:
                - /url: "#cite_note-Hayes-2013-64"
          - generic [ref=e832]:
            - heading "Techniques" [level=2] [ref=e833]
            - generic [ref=e834]:
              - text: "["
              - link "edit" [ref=e835] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=16
              - text: "]"
          - generic [ref=e836]:
            - heading "Traditional" [level=3] [ref=e837]
            - generic [ref=e838]:
              - text: "["
              - link "edit" [ref=e839] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=17
              - text: "]"
          - note [ref=e840]:
            - text: "Main article:"
            - link "Traditional animation" [ref=e841] [cursor=pointer]:
              - /url: /wiki/Traditional_animation
          - figure "An example of traditional animation, a horse animated by rotoscoping from Eadweard Muybridge's 19th-century photos" [ref=e842]:
            - link [ref=e843] [cursor=pointer]:
              - /url: /wiki/File:Animhorse.gif
              - img [ref=e844]
            - generic [ref=e845]:
              - text: An example of traditional animation, a horse animated by
              - link "rotoscoping" [ref=e846] [cursor=pointer]:
                - /url: /wiki/Rotoscoping
              - text: from
              - link "Eadweard Muybridge" [ref=e847] [cursor=pointer]:
                - /url: /wiki/Eadweard_Muybridge
              - text: "'s 19th-century photos"
          - paragraph [ref=e848]:
            - text: Traditional animation (also called cel animation or hand-drawn animation) is the process that was used for most animated films of the 20th century.
            - superscript [ref=e849]:
              - link "[65]" [ref=e850] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEWhite200631-65"
            - text: The individual frames of a traditionally animated film are photographs of drawings, first drawn on paper.
            - superscript [ref=e851]:
              - link "[66]" [ref=e852] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEBeckerman2003153-66"
            - text: To create the illusion of movement, each drawing differs slightly from the one before it. The animators' drawings are traced or photocopied onto transparent acetate sheets called
            - link "cels" [ref=e853] [cursor=pointer]:
              - /url: /wiki/Cel
            - text: ","
            - superscript [ref=e854]:
              - link "[67]" [ref=e855] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEThomasJohnston1981277–79-67"
            - text: which are filled in with paints in assigned colors or tones on the side opposite the line drawings.
            - superscript [ref=e856]:
              - link "[68]" [ref=e857] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTELaybourne1998203-68"
            - text: The completed character cels are photographed one-by-one against a painted background by a
            - link "rostrum camera" [ref=e858] [cursor=pointer]:
              - /url: /wiki/Rostrum_camera
            - text: onto motion picture film.
            - superscript [ref=e859]:
              - link "[69]" [ref=e860] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEWhite2006195–201-69"
          - paragraph [ref=e861]:
            - text: The traditional cel animation process became obsolete by the beginning of the 21st century. In modern traditionally animated films, animators' drawings and the backgrounds are either scanned into or drawn directly into a computer system.
            - superscript [ref=e862]:
              - link "[1]" [ref=e863] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEBuchan2013-1"
            - superscript [ref=e864]:
              - link "[70]" [ref=e865] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEWhite2006394-70"
            - text: Various software programs are used to color the drawings and simulate camera movement and effects.
            - superscript [ref=e866]:
              - link "[71]" [ref=e867] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTECulhane1990296-71"
            - text: The final animated piece is output to one of several delivery media, including traditional
            - link "35 mm film" [ref=e868] [cursor=pointer]:
              - /url: /wiki/35_mm_movie_film
            - text: and newer media with
            - link "digital video" [ref=e869] [cursor=pointer]:
              - /url: /wiki/Digital_video
            - text: .
            - superscript [ref=e870]:
              - link "[1]" [ref=e871] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEBuchan2013-1"
            - superscript [ref=e872]:
              - link "[72]" [ref=e873] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTELaybourne199835–36,_52–53-72"
            - text: The "look" of traditional cel animation is still preserved, and the
            - link "character animators" [ref=e874] [cursor=pointer]:
              - /url: /wiki/Character_animation
            - text: "' work has remained essentially the same over the past 90 years."
            - superscript [ref=e875]:
              - link "[60]" [ref=e876] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEWilliams200152–57-60"
            - text: Some animation producers have used the term "tradigital" (a play on the words "traditional" and "digital") to describe cel animation that uses significant computer technology.
          - paragraph [ref=e877]:
            - text: Examples of traditionally animated feature films include
            - link "Pinocchio" [ref=e879] [cursor=pointer]:
              - /url: /wiki/Pinocchio_(1940_film)
            - text: (United States, 1940),
            - superscript [ref=e880]:
              - link "[73]" [ref=e881] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTESolomon198963–65-73"
            - link "Animal Farm" [ref=e883] [cursor=pointer]:
              - /url: /wiki/Animal_Farm_(1954_film)
            - text: (United Kingdom, 1954),
            - link "Lucky and Zorba" [ref=e885] [cursor=pointer]:
              - /url: /wiki/Lucky_and_Zorba
            - text: (Italy, 1998), and
            - link "The Illusionist" [ref=e887] [cursor=pointer]:
              - /url: /wiki/The_Illusionist_(2010_film)
            - text: (British-French, 2010). Traditionally animated films produced with the aid of computer technology include
            - link "The Lion King" [ref=e889] [cursor=pointer]:
              - /url: /wiki/The_Lion_King
            - text: (US, 1994),
            - link "Anastasia" [ref=e891] [cursor=pointer]:
              - /url: /wiki/Anastasia_(1997_film)
            - text: (US, 1997),
            - link "The Prince of Egypt" [ref=e893] [cursor=pointer]:
              - /url: /wiki/The_Prince_of_Egypt
            - text: (US, 1998),
            - link "Akira" [ref=e895] [cursor=pointer]:
              - /url: /wiki/Akira_(1988_film)
            - text: (Japan, 1988),
            - superscript [ref=e896]:
              - link "[74]" [ref=e897] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEBeckerman200380-74"
            - link "Spirited Away" [ref=e899] [cursor=pointer]:
              - /url: /wiki/Spirited_Away
            - text: (Japan, 2001),
            - link "The Triplets of Belleville" [ref=e901] [cursor=pointer]:
              - /url: /wiki/The_Triplets_of_Belleville
            - text: (France, 2003), and
            - link "The Secret of Kells" [ref=e903] [cursor=pointer]:
              - /url: /wiki/The_Secret_of_Kells
            - text: (Irish-French-Belgian, 2009).
          - generic [ref=e904]:
            - heading "Full" [level=4] [ref=e905]
            - generic [ref=e906]:
              - text: "["
              - link "edit" [ref=e907] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=18
              - text: "]"
          - paragraph [ref=e908]:
            - text: Full animation is the process of producing high-quality traditionally animated films that regularly use detailed drawings and plausible movement,
            - superscript [ref=e909]:
              - link "[75]" [ref=e910] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTECulhane199071-75"
            - text: having a smooth animation.
            - superscript [ref=e911]:
              - link "[76]" [ref=e912] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTECulhane1990194–95-76"
            - text: Fully animated films can be made in a variety of styles, from more realistically animated works like those produced by the
            - link "Walt Disney studio" [ref=e913] [cursor=pointer]:
              - /url: /wiki/Walt_Disney_Animation_Studios
            - text: (
            - link "The Little Mermaid" [ref=e915] [cursor=pointer]:
              - /url: /wiki/The_Little_Mermaid_(1989_film)
            - text: ","
            - link "Beauty and the Beast" [ref=e917] [cursor=pointer]:
              - /url: /wiki/Beauty_and_the_Beast_(1991_film)
            - text: ","
            - link "Aladdin" [ref=e919] [cursor=pointer]:
              - /url: /wiki/Aladdin_(1992_Disney_film)
            - text: ","
            - link "The Lion King" [ref=e921] [cursor=pointer]:
              - /url: /wiki/The_Lion_King
            - text: ) to the more 'cartoon' styles of the
            - link "Warner Bros. animation studio" [ref=e922] [cursor=pointer]:
              - /url: /wiki/Warner_Bros._Cartoons
            - text: . Many of the
            - link "Disney animated features" [ref=e923] [cursor=pointer]:
              - /url: /wiki/List_of_Disney_theatrical_animated_feature_films
            - text: are examples of full animation, as are non-Disney works,
            - link "The Secret of NIMH" [ref=e925] [cursor=pointer]:
              - /url: /wiki/The_Secret_of_NIMH
            - text: (US, 1982),
            - link "The Iron Giant" [ref=e927] [cursor=pointer]:
              - /url: /wiki/The_Iron_Giant
            - text: (US, 1999), and
            - link "Nocturna" [ref=e929] [cursor=pointer]:
              - /url: /wiki/Nocturna_(film)
            - text: (Spain, 2007). Fully animated films are often animated on "twos", sometimes on "ones", which means that 12 to 24 drawings are required for a single second of film.
            - superscript [ref=e930]:
              - link "[77]" [ref=e931] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTELaybourne199825–26-77"
          - generic [ref=e932]:
            - heading "Limited" [level=4] [ref=e933]
            - generic [ref=e934]:
              - text: "["
              - link "edit" [ref=e935] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=19
              - text: "]"
          - note [ref=e936]:
            - text: "Main article:"
            - link "Limited animation" [ref=e937] [cursor=pointer]:
              - /url: /wiki/Limited_animation
          - paragraph [ref=e938]:
            - link "Limited animation" [ref=e940] [cursor=pointer]:
              - /url: /wiki/Limited_animation
            - text: involves the use of less detailed or more stylized drawings and methods of movement usually a choppy or "skippy" movement animation.
            - superscript [ref=e941]:
              - link "[78]" [ref=e942] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEBeckerman2003142-78"
            - text: Limited animation uses fewer drawings per second, thereby limiting the fluidity of the animation. This is a more economic technique. Pioneered by the artists at the American studio
            - link "United Productions of America" [ref=e943] [cursor=pointer]:
              - /url: /wiki/United_Productions_of_America
            - text: ","
            - superscript [ref=e944]:
              - link "[79]" [ref=e945] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEBeckerman200354–55-79"
            - text: limited animation can be used as a method of stylized artistic expression, as in
            - link "Gerald McBoing-Boing" [ref=e947] [cursor=pointer]:
              - /url: /wiki/Gerald_McBoing-Boing
            - text: (US, 1951),
            - link "Yellow Submarine" [ref=e949] [cursor=pointer]:
              - /url: /wiki/Yellow_Submarine_(film)
            - text: (UK, 1968), and certain
            - link "anime" [ref=e950] [cursor=pointer]:
              - /url: /wiki/Anime
            - text: produced in Japan.
            - superscript [ref=e951]:
              - link "[80]" [ref=e952] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTELedoux199724,_29-80"
            - text: Its primary use, however, has been in producing cost-effective animated content for media for television (the work of Hanna-Barbera,
            - superscript [ref=e953]:
              - link "[81]" [ref=e954] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTELawsonPersons200482-81"
            - link "Filmation" [ref=e955] [cursor=pointer]:
              - /url: /wiki/Filmation
            - text: ","
            - superscript [ref=e956]:
              - link "[82]" [ref=e957] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTESolomon1989241-82"
            - text: and other TV animation studios
            - superscript [ref=e958]:
              - link "[83]" [ref=e959] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTELawsonPersons2004xxi-83"
            - text: ) and later the
            - link "Internet" [ref=e960] [cursor=pointer]:
              - /url: /wiki/Internet
            - text: (
            - link "web cartoons" [ref=e961] [cursor=pointer]:
              - /url: /wiki/Web_cartoon
            - text: ).
          - generic [ref=e962]:
            - heading "Rotoscoping" [level=4] [ref=e963]
            - generic [ref=e964]:
              - text: "["
              - link "edit" [ref=e965] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=20
              - text: "]"
          - note [ref=e966]:
            - text: "Main article:"
            - link "Rotoscoping" [ref=e967] [cursor=pointer]:
              - /url: /wiki/Rotoscoping
          - paragraph [ref=e968]:
            - text: Rotoscoping is a technique patented by
            - link "Max Fleischer" [ref=e969] [cursor=pointer]:
              - /url: /wiki/Max_Fleischer
            - text: in 1917 where animators trace live-action movement, frame by frame.
            - superscript [ref=e970]:
              - link "[84]" [ref=e971] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTECrafton1993158-84"
            - text: The source film can be directly copied from actors' outlines into animated drawings,
            - superscript [ref=e972]:
              - link "[85]" [ref=e973] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTELaybourne1998163–64-85"
            - text: as in
            - link "The Lord of the Rings" [ref=e975] [cursor=pointer]:
              - /url: /wiki/The_Lord_of_the_Rings_(1978_film)
            - text: (US, 1978), or used in a stylized and expressive manner, as in
            - link "Waking Life" [ref=e977] [cursor=pointer]:
              - /url: /wiki/Waking_Life
            - text: (US, 2001) and
            - link "A Scanner Darkly" [ref=e979] [cursor=pointer]:
              - /url: /wiki/A_Scanner_Darkly_(film)
            - text: (US, 2006). Some other examples are
            - link "Fire and Ice" [ref=e981] [cursor=pointer]:
              - /url: /wiki/Fire_and_Ice_(1983_film)
            - text: (US, 1983),
            - link "Heavy Metal" [ref=e983] [cursor=pointer]:
              - /url: /wiki/Heavy_Metal_(film)
            - text: (1981), and
            - link "Aku no Hana" [ref=e985] [cursor=pointer]:
              - /url: /wiki/The_Flowers_of_Evil_(manga)
            - text: (Japan, 2013).
            - superscript [ref=e986]:
              - text: "["
              - link "citation needed" [ref=e988] [cursor=pointer]:
                - /url: /wiki/Wikipedia:Citation_needed
              - text: "]"
          - generic [ref=e989]:
            - heading "Live-action blending" [level=4] [ref=e990]
            - generic [ref=e991]:
              - text: "["
              - link "edit" [ref=e992] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=21
              - text: "]"
          - note [ref=e993]:
            - text: "Main article:"
            - link "Live-action animation" [ref=e994] [cursor=pointer]:
              - /url: /wiki/Live-action_animation
          - paragraph [ref=e995]:
            - link "Live-action/animation" [ref=e997] [cursor=pointer]:
              - /url: /wiki/Live-action_animation
            - text: is a technique combining hand-drawn characters into live action shots or live-action actors into animated shots.
            - superscript [ref=e998]:
              - link "[86]" [ref=e999] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTELaybourne1998162–63-86"
            - text: One of the earlier uses was in
            - link "Koko the Clown" [ref=e1000] [cursor=pointer]:
              - /url: /wiki/Koko_the_Clown
            - text: when Koko was drawn over live-action footage.
            - superscript [ref=e1001]:
              - link "[87]" [ref=e1002] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEBeck200418–19-87"
            - text: Walt Disney and Ub Iwerks created a series of
            - link "Alice Comedies" [ref=e1004] [cursor=pointer]:
              - /url: /wiki/Alice_Comedies
            - text: (1923–1927), in which a live-action girl enters an animated world. Other examples include
            - link "Allegro Non Troppo" [ref=e1006] [cursor=pointer]:
              - /url: /wiki/Allegro_Non_Troppo
            - text: (Italy, 1976),
            - link "Who Framed Roger Rabbit" [ref=e1008] [cursor=pointer]:
              - /url: /wiki/Who_Framed_Roger_Rabbit
            - text: (US, 1988),
            - link "Volere volare" [ref=e1010] [cursor=pointer]:
              - /url: /wiki/Volere_volare
            - text: (Italy 1991),
            - link "Cool World" [ref=e1012] [cursor=pointer]:
              - /url: /wiki/Cool_World
            - text: (US, 1992),
            - link "The Pagemaster" [ref=e1014] [cursor=pointer]:
              - /url: /wiki/The_Pagemaster
            - text: (US, 1994)
            - link "Space Jam" [ref=e1016] [cursor=pointer]:
              - /url: /wiki/Space_Jam
            - text: (US, 1996) and
            - link "Osmosis Jones" [ref=e1018] [cursor=pointer]:
              - /url: /wiki/Osmosis_Jones
            - text: (US, 2001).
            - superscript [ref=e1019]:
              - text: "["
              - link "citation needed" [ref=e1021] [cursor=pointer]:
                - /url: /wiki/Wikipedia:Citation_needed
              - text: "]"
          - generic [ref=e1022]:
            - heading "Stop motion" [level=3] [ref=e1023]
            - generic [ref=e1024]:
              - text: "["
              - link "edit" [ref=e1025] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=22
              - text: "]"
          - note [ref=e1026]:
            - text: "Main article:"
            - link "Stop motion" [ref=e1027] [cursor=pointer]:
              - /url: /wiki/Stop_motion
          - paragraph [ref=e1028]:
            - link "Stop motion" [ref=e1029] [cursor=pointer]:
              - /url: /wiki/Stop_motion
            - text: is used to describe animation created by physically manipulating real-world objects and photographing them one frame of film at a time to create the illusion of movement.
            - superscript [ref=e1030]:
              - link "[88]" [ref=e1031] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTESolomon1989299-88"
            - text: There are many different types of stop-motion animation, usually named after the materials used to create the animation.
            - superscript [ref=e1032]:
              - link "[89]" [ref=e1033] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTELaybourne1998159-89"
            - text: Computer software is widely available to create this type of animation; traditional stop-motion animation is usually less expensive but more time-consuming to produce than current computer animation.
            - superscript [ref=e1034]:
              - link "[89]" [ref=e1035] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTELaybourne1998159-89"
          - generic [ref=e1036]:
            - term [ref=e1037]:
              - link "Stop motion" [ref=e1038] [cursor=pointer]:
                - /url: /wiki/Stop_motion
            - definition [ref=e1039]:
              - text: Typically involves stop-motion puppet figures interacting in a constructed environment, in contrast to real-world interaction in model animation.
              - superscript [ref=e1040]:
                - link "[90]" [ref=e1041] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTESolomon1989171-90"
              - text: The puppets generally have an
              - link "armature" [ref=e1042] [cursor=pointer]:
                - /url: /wiki/Armature_(sculpture)
              - text: inside of them to keep them still and steady to constrain their motion to particular joints.
              - superscript [ref=e1043]:
                - link "[91]" [ref=e1044] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTELaybourne1998155–56-91"
              - text: Examples include
              - link "The Tale of the Fox" [ref=e1046] [cursor=pointer]:
                - /url: /wiki/The_Tale_of_the_Fox
              - text: (France, 1937),
              - link "The Nightmare Before Christmas" [ref=e1048] [cursor=pointer]:
                - /url: /wiki/The_Nightmare_Before_Christmas
              - text: (US, 1993),
              - link "Corpse Bride" [ref=e1050] [cursor=pointer]:
                - /url: /wiki/Corpse_Bride
              - text: (US, 2005),
              - link "Coraline" [ref=e1052] [cursor=pointer]:
                - /url: /wiki/Coraline_(film)
              - text: (US, 2009), the films of
              - link "Jiří Trnka" [ref=e1053] [cursor=pointer]:
                - /url: /wiki/Ji%C5%99%C3%AD_Trnka
              - text: and the adult animated sketch-comedy television series
              - link "Robot Chicken" [ref=e1055] [cursor=pointer]:
                - /url: /wiki/Robot_Chicken
              - text: (US, 2005–present).
              - generic [ref=e1056]:
                - term [ref=e1057]:
                  - link "Puppetoons" [ref=e1058] [cursor=pointer]:
                    - /url: /wiki/Puppetoons
                - definition [ref=e1059]:
                  - text: Created using techniques developed by
                  - link "George Pal" [ref=e1060] [cursor=pointer]:
                    - /url: /wiki/George_Pal
                  - text: ","
                  - superscript [ref=e1061]:
                    - link "[92]" [ref=e1062] [cursor=pointer]:
                      - /url: "#cite_note-FOOTNOTEBeck200470-92"
                  - text: are puppet-animated films that typically use a different version of a puppet for different frames, rather than manipulating one existing puppet.
                  - superscript [ref=e1063]:
                    - link "[93]" [ref=e1064] [cursor=pointer]:
                      - /url: "#cite_note-FOOTNOTEBeck200492–93-93"
          - figure "A clay animation scene from a Finnish television commercial" [ref=e1065]:
            - link [ref=e1066] [cursor=pointer]:
              - /url: /wiki/File:Claychick.jpg
              - img [ref=e1067]
            - generic [ref=e1068]:
              - text: A clay animation scene from a
              - link "Finnish" [ref=e1069] [cursor=pointer]:
                - /url: /wiki/Finland
              - text: television commercial
          - generic [ref=e1070]:
            - term [ref=e1071]:
              - link "Clay animation" [ref=e1072] [cursor=pointer]:
                - /url: /wiki/Clay_animation
              - text: or
              - link "Plasticine" [ref=e1073] [cursor=pointer]:
                - /url: /wiki/Plasticine
              - text: animation
            - definition [ref=e1074]:
              - text: (Often called claymation, which, however, is a
              - link "trademarked" [ref=e1075] [cursor=pointer]:
                - /url: /wiki/Laika,_LLC
              - text: name). It uses figures made of clay or a similar malleable material to create stop-motion animation.
              - superscript [ref=e1076]:
                - link "[88]" [ref=e1077] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTESolomon1989299-88"
              - superscript [ref=e1078]:
                - link "[94]" [ref=e1079] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTELaybourne1998150–151-94"
              - text: The figures may have an
              - link "armature" [ref=e1080] [cursor=pointer]:
                - /url: /wiki/Armature_(sculpture)
              - text: or wire frame inside, similar to the related puppet animation (below), that can be manipulated to pose the figures.
              - superscript [ref=e1081]:
                - link "[95]" [ref=e1082] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTELaybourne1998151–54-95"
              - text: Alternatively, the figures may be made entirely of clay, in the films of
              - link "Bruce Bickford" [ref=e1083] [cursor=pointer]:
