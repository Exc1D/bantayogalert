      - generic "Animation" [ref=e226]:
        - generic [ref=e228]: From Wikipedia, the free encyclopedia
        - generic [ref=e230]:
          - note [ref=e231]:
            - text: "\"Animate\" redirects here. For other uses, see"
            - link "Animate (disambiguation)" [ref=e232] [cursor=pointer]:
              - /url: /wiki/Animate_(disambiguation)
            - text: and
            - link "Animation (disambiguation)" [ref=e233] [cursor=pointer]:
              - /url: /wiki/Animation_(disambiguation)
            - text: .
          - generic [ref=e235]:
            - generic [ref=e237]:
              - link "Weare" [ref=e240] [cursor=pointer]:
                - /url: /wiki/File:Animexample.gif
                - img "Weare" [ref=e241]
              - generic [ref=e242]:
                - text: 2D computer animation moving at 10
                - link "frames per second" [ref=e243] [cursor=pointer]:
                  - /url: /wiki/Frames_per_second
                - text: (FPS)
            - generic [ref=e245]:
              - link [ref=e248] [cursor=pointer]:
                - /url: /wiki/File:Animexample3edit.png
                - img [ref=e249]
              - generic [ref=e250]: The animation above consists of these six frames repeated indefinitely.
          - paragraph [ref=e251]:
            - text: Animation is a
            - link "filmmaking" [ref=e252] [cursor=pointer]:
              - /url: /wiki/Filmmaking
            - text: technique whereby
            - link "pictures" [ref=e253] [cursor=pointer]:
              - /url: /wiki/Image
            - text: are created or manipulated and then played in sequence to create the illusion of
            - link "moving images" [ref=e254] [cursor=pointer]:
              - /url: /wiki/Motion_picture
            - text: . In
            - link "traditional animation" [ref=e255] [cursor=pointer]:
              - /url: /wiki/Traditional_animation
            - text: ", images are drawn or painted by hand on"
            - link "transparent celluloid sheets" [ref=e256] [cursor=pointer]:
              - /url: /wiki/Cel
            - text: to be
            - link "photographed" [ref=e257] [cursor=pointer]:
              - /url: /wiki/Photograph
            - text: and exhibited on
            - link "film" [ref=e258] [cursor=pointer]:
              - /url: /wiki/Film
            - text: . Animation has been recognized as an artistic medium, specifically within the
            - link "entertainment industry" [ref=e259] [cursor=pointer]:
              - /url: /wiki/Entertainment#Industry
            - text: . Many animations are either traditional animations or
            - link "computer animations" [ref=e260] [cursor=pointer]:
              - /url: /wiki/Computer_animation
            - text: made with
            - link "computer-generated imagery" [ref=e261] [cursor=pointer]:
              - /url: /wiki/Computer-generated_imagery
            - text: (CGI).
            - link "Stop motion animation" [ref=e262] [cursor=pointer]:
              - /url: /wiki/Stop_motion_animation
            - text: ", in particular"
            - link "claymation" [ref=e263] [cursor=pointer]:
              - /url: /wiki/Claymation
            - text: ", is also prominent alongside these other forms, albeit to a lesser degree."
          - paragraph [ref=e264]:
            - text: Animation is contrasted with
            - link "live action" [ref=e265] [cursor=pointer]:
              - /url: /wiki/Live_action
            - text: ", although the two do not exist in isolation. Many filmmakers have produced"
            - link "films that are a hybrid of the two" [ref=e266] [cursor=pointer]:
              - /url: /wiki/Live-action_animation
            - text: . As CGI increasingly
            - link "approximates photographic imagery" [ref=e267] [cursor=pointer]:
              - /url: /wiki/Photorealism
            - text: ", filmmakers can relatively easily"
            - link "composite" [ref=e268] [cursor=pointer]:
              - /url: /wiki/Compositing
            - text: 3D animated
            - link "visual effects" [ref=e269] [cursor=pointer]:
              - /url: /wiki/Visual_effects
            - text: (VFX) into their film, rather than using
            - link "practical effects" [ref=e270] [cursor=pointer]:
              - /url: /wiki/Practical_effect
            - text: .
          - generic [ref=e271]:
            - heading "General overview" [level=2] [ref=e272]
            - generic [ref=e273]:
              - text: "["
              - link "edit" [ref=e274] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=1
              - text: "]"
          - paragraph [ref=e275]:
            - link "Computer animation" [ref=e276] [cursor=pointer]:
              - /url: /wiki/Computer_animation
            - text: can be very detailed
            - link "3D animation" [ref=e277] [cursor=pointer]:
              - /url: /wiki/Computer_animation#Animation_methods
            - text: ", while 2D computer animation (which may have the look of traditional animation) can be used for stylistic reasons, low bandwidth, or faster"
            - link "real-time renderings" [ref=e278] [cursor=pointer]:
              - /url: /wiki/Real-time_rendering
            - text: . Other common animation methods apply a
            - link "stop motion" [ref=e279] [cursor=pointer]:
              - /url: /wiki/Stop_motion
            - text: technique to two- and three-dimensional objects like
            - link "paper cutouts" [ref=e280] [cursor=pointer]:
              - /url: /wiki/Cutout_animation
            - text: ","
            - link "puppets" [ref=e281] [cursor=pointer]:
              - /url: /wiki/Puppet
            - text: ", or"
            - link "clay figures" [ref=e282] [cursor=pointer]:
              - /url: /wiki/Claymation
            - text: .
          - paragraph [ref=e283]:
            - text: An animated cartoon, or simply a cartoon, is an animated film, usually short, that features an exaggerated
            - link "style" [ref=e284] [cursor=pointer]:
              - /url: /wiki/Style_(visual_arts)
            - text: . This style is often inspired by comic strips, gag cartoons, and other non-animated art forms. Cartoons frequently include anthropomorphic animals,
            - link "superheroes" [ref=e285] [cursor=pointer]:
              - /url: /wiki/Superheroes
            - text: ", or the adventures of human protagonists. The action often revolves around exaggerated"
            - link "physical humor" [ref=e286] [cursor=pointer]:
              - /url: /wiki/Cartoon_violence
            - text: ", particularly in predator/prey dynamics (e.g. cats and mice, coyotes and birds), where violent pratfalls such as falls, collisions, and explosions occur, often in ways that would be lethal in the real life."
          - paragraph [ref=e287]:
            - text: During the late 1980s, the term "cartoon" was shortened to
            - generic [ref=e288]: toon
            - text: ", referring to characters in animated productions, or more specifically, cartoonishly-drawn characters. This term gained popularity first in 1988 with the live-action/animated hybrid film"
            - link "Who Framed Roger Rabbit" [ref=e290] [cursor=pointer]:
              - /url: /wiki/Who_Framed_Roger_Rabbit
            - text: ", which introduced ToonTown, a world inhabited by various animated cartoon characters. In 1990,"
            - link "Tiny Toon Adventures" [ref=e292] [cursor=pointer]:
              - /url: /wiki/Tiny_Toon_Adventures
            - text: embraced the classic cartoon spirit, introducing a new generation of cartoon characters. Then, in 1993,
            - link "Animaniacs" [ref=e294] [cursor=pointer]:
              - /url: /wiki/Animaniacs
            - text: followed, featuring the three
            - link "rubber-hose" [ref=e295] [cursor=pointer]:
              - /url: /wiki/Rubber_hose_animation
            - text: "-styled Warner siblings, Yakko Warner, Wakko Warner, and Dot Warner, who are trapped in the 1930s, eventually escaped and found themselves in the"
            - link "Warner Bros. water tower" [ref=e296] [cursor=pointer]:
              - /url: /wiki/Warner_Bros._Water_Tower
            - text: in the 1990s.
          - paragraph [ref=e297]:
            - text: The illusion of animation—as in motion pictures in general—has traditionally been attributed to the
            - link "persistence of vision" [ref=e298] [cursor=pointer]:
              - /url: /wiki/Persistence_of_vision
            - text: and later to the
            - link "phi phenomenon" [ref=e299] [cursor=pointer]:
              - /url: /wiki/Phi_phenomenon
            - text: and
            - link "beta movement" [ref=e300] [cursor=pointer]:
              - /url: /wiki/Beta_movement
            - text: ", but the exact neurological causes are still uncertain. The illusion of motion caused by a rapid succession of images that minimally differ from each other, with unnoticeable interruptions, is a"
            - link "stroboscopic effect" [ref=e301] [cursor=pointer]:
              - /url: /wiki/Stroboscopic_effect
            - text: . While
            - link "animators" [ref=e302] [cursor=pointer]:
              - /url: /wiki/Animator
            - text: traditionally used to draw each part of the movements and changes of figures on transparent cels that could be moved over a separate background, computer animation is usually based on programming paths between
            - link "key frames" [ref=e303] [cursor=pointer]:
              - /url: /wiki/Key_frame
            - text: to maneuver digitally created figures throughout a digitally created environment.
          - paragraph [ref=e304]:
            - link "Analog" [ref=e305] [cursor=pointer]:
              - /url: /wiki/Analog_device
            - text: mechanical animation media that rely on the rapid display of sequential images include the
            - link "phenakistiscope" [ref=e306] [cursor=pointer]:
              - /url: /wiki/Phenakistiscope
            - text: ","
            - link "zoetrope" [ref=e307] [cursor=pointer]:
              - /url: /wiki/Zoetrope
            - text: ","
            - link "flip book" [ref=e308] [cursor=pointer]:
              - /url: /wiki/Flip_book
            - text: ","
            - link "praxinoscope" [ref=e309] [cursor=pointer]:
              - /url: /wiki/Praxinoscope
            - text: ", and film."
            - link "Television" [ref=e310] [cursor=pointer]:
              - /url: /wiki/Television
            - text: and
            - link "video" [ref=e311] [cursor=pointer]:
              - /url: /wiki/Video
            - text: are popular electronic animation media that originally were analog and now operate
            - link "digitally" [ref=e312] [cursor=pointer]:
              - /url: /wiki/Digital_media
            - text: . For display on computers, technology such as the
            - link "animated GIF" [ref=e313] [cursor=pointer]:
              - /url: /wiki/Animated_GIF
            - text: and
            - link "Flash animation" [ref=e314] [cursor=pointer]:
              - /url: /wiki/Flash_animation
            - text: were developed.
          - paragraph [ref=e315]:
            - text: In addition to
            - link "short films" [ref=e316] [cursor=pointer]:
              - /url: /wiki/Short_film
            - text: ","
            - link "feature films" [ref=e317] [cursor=pointer]:
              - /url: /wiki/Feature_film
            - text: ","
            - link "television series" [ref=e318] [cursor=pointer]:
              - /url: /wiki/Television_show
            - text: ", animated GIFs, and other media dedicated to the display of moving images, animation is also prevalent in"
            - link "video games" [ref=e319] [cursor=pointer]:
              - /url: /wiki/Video_game
            - text: ","
            - link "motion graphics" [ref=e320] [cursor=pointer]:
              - /url: /wiki/Motion_graphics
            - text: ","
            - link "user interfaces" [ref=e321] [cursor=pointer]:
              - /url: /wiki/User_interface
            - text: ", and"
            - link "visual effects" [ref=e322] [cursor=pointer]:
              - /url: /wiki/Visual_effects
            - text: .
            - superscript [ref=e323]:
              - link "[1]" [ref=e324] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEBuchan2013-1"
          - paragraph [ref=e325]:
            - text: The physical movement of image parts through simple mechanics—for instance, moving images in
            - link "magic lantern" [ref=e326] [cursor=pointer]:
              - /url: /wiki/Magic_lantern
            - text: shows—can also be considered animation. The mechanical manipulation of three-dimensional puppets and objects to emulate living beings has a very long history in
            - link "automata" [ref=e327] [cursor=pointer]:
              - /url: /wiki/Automaton
            - text: . Electronic automata were popularized by
            - link "Disney" [ref=e328] [cursor=pointer]:
              - /url: /wiki/The_Walt_Disney_Company
            - text: as
            - link "animatronics" [ref=e329] [cursor=pointer]:
              - /url: /wiki/Animatronics
            - text: .
          - generic [ref=e330]:
            - heading "Etymology" [level=2] [ref=e331]
            - generic [ref=e332]:
              - text: "["
              - link "edit" [ref=e333] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=2
              - text: "]"
          - paragraph [ref=e334]:
            - text: The word animation comes to the Latin word animātiō, meaning 'bestowing of life'.
            - superscript [ref=e335]:
              - link "[2]" [ref=e336] [cursor=pointer]:
                - /url: "#cite_note-2"
            - text: The earlier meaning of the English word is 'liveliness' and has been in use much longer than the meaning of 'moving image medium'.
          - generic [ref=e337]:
            - heading "History" [level=2] [ref=e338]
            - generic [ref=e339]:
              - text: "["
              - link "edit" [ref=e340] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=3
              - text: "]"
          - figure "Prof. Stampfers Stroboscopische Scheibe No. X (1833)" [ref=e341]:
