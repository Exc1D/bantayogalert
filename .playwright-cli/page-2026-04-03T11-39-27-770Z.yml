              - text: (US, 1997) and the music video Live for the moment, from Verona Riots band (produced by Alberto Serrano and Nívola Uyá, Spain 2014).
              - generic [ref=e1130]:
                - term [ref=e1131]:
                  - link "Silhouette animation" [ref=e1132] [cursor=pointer]:
                    - /url: /wiki/Silhouette_animation
                - definition [ref=e1133]:
                  - text: A variant of cutout animation in which the characters are backlit and only visible as silhouettes.
                  - superscript [ref=e1134]:
                    - link "[99]" [ref=e1135] [cursor=pointer]:
                      - /url: "#cite_note-FOOTNOTECulhane1990170–171-99"
                  - text: Examples include
                  - link "The Adventures of Prince Achmed" [ref=e1137] [cursor=pointer]:
