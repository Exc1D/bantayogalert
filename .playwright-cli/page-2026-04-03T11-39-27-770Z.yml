              - link "Émile Cohl" [ref=e356] [cursor=pointer]:
                - /url: /wiki/%C3%89mile_Cohl
          - note [ref=e357]:
            - text: "Main article:"
            - link "History of animation" [ref=e358] [cursor=pointer]:
              - /url: /wiki/History_of_animation
          - generic [ref=e359]:
            - heading "Before cinematography" [level=3] [ref=e360]
            - generic [ref=e361]:
              - text: "["
              - link "edit" [ref=e362] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=4
              - text: "]"
          - note [ref=e363]:
            - text: "Main article:"
            - link "Early history of animation" [ref=e364] [cursor=pointer]:
              - /url: /wiki/Early_history_of_animation
          - paragraph [ref=e365]:
            - text: Long before modern animation began, audiences around the world were captivated by the magic of moving characters. For centuries, master artists and craftsmen have brought puppets,
            - link "automatons" [ref=e366] [cursor=pointer]:
              - /url: /wiki/Automaton
            - text: ","
            - link "shadow puppets" [ref=e367] [cursor=pointer]:
              - /url: /wiki/Shadow_puppets
            - text: ", and fantastical"
            - link "lanterns" [ref=e368] [cursor=pointer]:
              - /url: /wiki/Lantern
            - text: to life, inspiring the imagination through physically manipulated wonders.
            - superscript [ref=e369]:
              - link "[3]" [ref=e370] [cursor=pointer]:
                - /url: "#cite_note-3"
          - paragraph [ref=e371]:
            - text: In 1833, the
            - link "stroboscopic" [ref=e372] [cursor=pointer]:
              - /url: /wiki/Stroboscope
            - text: disc (better known as the
            - link "phenakistiscope" [ref=e373] [cursor=pointer]:
              - /url: /wiki/Phenakistiscope
            - text: ) introduced the principle of modern animation, which would also be applied in the
            - link "zoetrope" [ref=e374] [cursor=pointer]:
              - /url: /wiki/Zoetrope
            - text: (introduced in 1866), the
            - link "flip book" [ref=e375] [cursor=pointer]:
              - /url: /wiki/Flip_book
            - text: (1868), the
            - link "praxinoscope" [ref=e376] [cursor=pointer]:
              - /url: /wiki/Praxinoscope
            - text: (1877) and
            - link "film" [ref=e377] [cursor=pointer]:
              - /url: /wiki/Film
            - text: .
          - paragraph [ref=e378]:
            - text: The device was operated by spinning the cardboard disc and viewing the reflection of the image in a mirror through a series of moving slits, which created the illusion that the image was moving.
            - superscript [ref=e379]:
              - link "[4]" [ref=e380] [cursor=pointer]:
                - /url: "#cite_note-4"
          - generic [ref=e381]:
            - heading "Silent era" [level=3] [ref=e382]
            - generic [ref=e383]:
              - text: "["
              - link "edit" [ref=e384] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=5
              - text: "]"
          - paragraph [ref=e385]:
            - text: When
            - link "cinematography" [ref=e386] [cursor=pointer]:
              - /url: /wiki/Cinematography
            - text: eventually broke through in the 1890s, the wonder of the realistic details in the new medium was seen as its biggest accomplishment. It took years before animation found its way to the cinemas. The successful short The Haunted Hotel (1907) by
            - link "J. Stuart Blackton" [ref=e387] [cursor=pointer]:
              - /url: /wiki/J._Stuart_Blackton
            - text: popularized
            - link "stop motion" [ref=e388] [cursor=pointer]:
              - /url: /wiki/Stop_motion
            - text: and reportedly inspired
            - link "Émile Cohl" [ref=e389] [cursor=pointer]:
              - /url: /wiki/%C3%89mile_Cohl
            - text: to create
            - link "Fantasmagorie" [ref=e391] [cursor=pointer]:
              - /url: /wiki/Fantasmagorie_(film)
            - text: (1908), regarded as the oldest known example of a complete
            - link "traditional (hand-drawn) animation" [ref=e392] [cursor=pointer]:
              - /url: /wiki/Traditional_animation
            - text: on standard cinematographic film. Other great artistic and very influential short films were created by
            - link "Ladislas Starevich" [ref=e393] [cursor=pointer]:
              - /url: /wiki/Ladislas_Starevich
            - text: with his puppet animations since 1910 and by
            - link "Winsor McCay" [ref=e394] [cursor=pointer]:
              - /url: /wiki/Winsor_McCay
            - text: with detailed hand-drawn animation in films such as
            - link "Little Nemo" [ref=e396] [cursor=pointer]:
              - /url: /wiki/Little_Nemo_(1911_film)
            - text: (1911) and
            - link "Gertie the Dinosaur" [ref=e398] [cursor=pointer]:
              - /url: /wiki/Gertie_the_Dinosaur
            - text: (1914).
            - superscript [ref=e399]:
              - link "[5]" [ref=e400] [cursor=pointer]:
                - /url: "#cite_note-5"
          - paragraph [ref=e401]:
            - text: During the 1910s, the production of animated "
            - link "cartoons" [ref=e402] [cursor=pointer]:
              - /url: /wiki/Cartoons
            - text: "\" became an industry in the US."
            - superscript [ref=e403]:
              - link "[6]" [ref=e404] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTESolomon198928-6"
            - text: Successful producer
            - link "John Randolph Bray" [ref=e405] [cursor=pointer]:
              - /url: /wiki/John_Randolph_Bray
            - text: and animator
            - link "Earl Hurd" [ref=e406] [cursor=pointer]:
              - /url: /wiki/Earl_Hurd
            - text: ", patented the"
            - link "cel animation" [ref=e407] [cursor=pointer]:
              - /url: /wiki/Cel_animation
            - text: process that dominated the animation industry for the rest of the century.
            - superscript [ref=e408]:
              - link "[7]" [ref=e409] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTESolomon198924-7"
            - superscript [ref=e410]:
              - link "[8]" [ref=e411] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTESolomon198934-8"
            - link "Felix the Cat" [ref=e412] [cursor=pointer]:
              - /url: /wiki/Felix_the_Cat
            - text: ", who debuted in 1919, became the first fully realized anthropomorphic animal character in the history of American animation."
            - superscript [ref=e413]:
              - link "[9]" [ref=e414] [cursor=pointer]:
                - /url: "#cite_note-9"
          - figure "Feline Follies with Felix the Cat, silent, 1919" [ref=e415]:
            - generic [ref=e417]:
