              - generic [ref=e1106]:
                - term [ref=e1107]:
                  - link "Strata-cut animation" [ref=e1108] [cursor=pointer]:
                    - /url: /wiki/Strata-cut_animation
                - definition [ref=e1109]:
                  - text: Most commonly a form of clay animation in which a long bread-like "loaf" of clay, internally packed tight and loaded with varying imagery, is sliced into thin sheets, with the animation camera taking a frame of the end of the loaf for each cut, eventually revealing the movement of the internal images within.
                  - superscript [ref=e1110]:
