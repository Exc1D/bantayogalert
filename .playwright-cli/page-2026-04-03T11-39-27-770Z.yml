          - list [ref=e1425]:
            - listitem [ref=e1426]:
              - link "Musical fountain" [ref=e1428] [cursor=pointer]:
                - /url: /wiki/Musical_fountain
              - text: ": a"
              - link "hydrautechnical" [ref=e1429] [cursor=pointer]:
                - /url: /wiki/Hydraulic_engineering
              - text: show that includes water and lights, nowadays often combined with lasers and high-definition projections on mist screens.
              - superscript [ref=e1430]:
                - link "[139]" [ref=e1431] [cursor=pointer]:
                  - /url: "#cite_note-139"
            - listitem [ref=e1432]:
              - link "Drawn-on-film animation" [ref=e1434] [cursor=pointer]:
                - /url: /wiki/Drawn-on-film_animation
              - text: ": a technique where footage is produced by creating the images directly on"
              - link "film stock" [ref=e1435] [cursor=pointer]:
                - /url: /wiki/Film_stock
              - text: ; for example, by
              - link "Norman McLaren" [ref=e1436] [cursor=pointer]:
                - /url: /wiki/Norman_McLaren
              - text: ","
              - superscript [ref=e1437]:
                - link "[140]" [ref=e1438] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEFaberWalters20041979-140"
              - link "Len Lye" [ref=e1439] [cursor=pointer]:
                - /url: /wiki/Len_Lye
              - text: and
              - link "Stan Brakhage" [ref=e1440] [cursor=pointer]:
                - /url: /wiki/Stan_Brakhage
              - text: .
            - listitem [ref=e1441]:
              - link "Paint-on-glass animation" [ref=e1443] [cursor=pointer]:
                - /url: /wiki/Paint-on-glass_animation
              - text: ": a technique for making animated films by manipulating slow drying"
              - link "oil paints" [ref=e1444] [cursor=pointer]:
                - /url: /wiki/Oil_paint
              - text: on sheets of glass,
              - superscript [ref=e1445]:
                - link "[141]" [ref=e1446] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEPilling1997222-141"
              - text: for example by
              - link "Aleksandr Petrov" [ref=e1447] [cursor=pointer]:
                - /url: /wiki/Aleksandr_Petrov_(animator)
              - text: .
              - superscript [ref=e1448]:
                - link "[142]" [ref=e1449] [cursor=pointer]:
                  - /url: "#cite_note-142"
            - listitem [ref=e1450]:
              - link "Erasure animation" [ref=e1452] [cursor=pointer]:
                - /url: /wiki/Charcoal
              - text: ": a technique using traditional 2D media, photographed over time as the artist manipulates the image. For example,"
              - link "William Kentridge" [ref=e1453] [cursor=pointer]:
                - /url: /wiki/William_Kentridge
              - text: is famous for his
              - link "charcoal" [ref=e1454] [cursor=pointer]:
                - /url: /wiki/Charcoal
              - text: erasure films,
              - superscript [ref=e1455]:
                - link "[143]" [ref=e1456] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTECarbone2010-143"
              - text: and
              - link "Piotr Dumała" [ref=e1457] [cursor=pointer]:
                - /url: /wiki/Piotr_Duma%C5%82a
              - text: for his auteur technique of animating scratches on plaster.
              - superscript [ref=e1458]:
                - link "[144]" [ref=e1459] [cursor=pointer]:
                  - /url: "#cite_note-144"
            - listitem [ref=e1460]:
              - link "Pinscreen animation" [ref=e1462] [cursor=pointer]:
                - /url: /wiki/Pinscreen_animation
              - text: ": makes use of a screen filled with movable pins that can be moved in or out by pressing an object onto the screen."
              - superscript [ref=e1463]:
                - link "[145]" [ref=e1464] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTENeupert2011-145"
              - text: The screen is lit from the side so that the pins cast shadows. The technique has been used to create animated films with a range of textural effects difficult to achieve with traditional cel animation.
              - superscript [ref=e1465]:
                - link "[146]" [ref=e1466] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEPilling1997204-146"
            - listitem [ref=e1467]:
              - link "Sand animation" [ref=e1469] [cursor=pointer]:
                - /url: /wiki/Sand_animation
              - text: ": sand is moved around on a back- or front-"
              - link "lighted" [ref=e1470] [cursor=pointer]:
                - /url: /wiki/Light
              - text: piece of glass to create each frame for an animated film.
              - superscript [ref=e1471]:
                - link "[147]" [ref=e1472] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEBrown20037-147"
              - text: This creates an interesting effect when animated because of the light
              - link "contrast" [ref=e1473] [cursor=pointer]:
                - /url: /wiki/Contrast_(vision)
              - text: .
              - superscript [ref=e1474]:
                - link "[148]" [ref=e1475] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEFurniss199830–33-148"
            - listitem [ref=e1476]:
              - link "Flip book" [ref=e1478] [cursor=pointer]:
                - /url: /wiki/Flip_book
              - text: ": a flip book (sometimes, especially in British English, called a flick book) is a book with a series of pictures that vary gradually from one page to the next, so that when the pages are turned rapidly, the pictures appear to animate by simulating motion or some other change."
              - superscript [ref=e1479]:
                - link "[149]" [ref=e1480] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTELaybourne199822–24-149"
              - superscript [ref=e1481]:
                - link "[150]" [ref=e1482] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTESolomon19898–10-150"
              - text: Flip books are often illustrated books for children,
              - superscript [ref=e1483]:
                - link "[151]" [ref=e1484] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTELaybourne1998xiv-151"
              - text: they also are geared towards adults and employ a series of photographs rather than drawings. Flip books are not always separate books, they appear as an added feature in ordinary books or magazines, often in the page corners.
              - superscript [ref=e1485]:
                - link "[149]" [ref=e1486] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTELaybourne199822–24-149"
              - text: Software packages and websites are also available that convert digital video files into custom-made flip books.
              - superscript [ref=e1487]:
                - link "[152]" [ref=e1488] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEWhite2006203-152"
            - listitem [ref=e1489]:
              - link "Character animation" [ref=e1491] [cursor=pointer]:
                - /url: /wiki/Character_animation
            - listitem [ref=e1492]:
              - generic [ref=e1493]:
                - link "Multi-sketch" [ref=e1494] [cursor=pointer]:
                  - /url: /wiki/Multi-sketch
                - text: animation
            - listitem [ref=e1495]:
              - generic [ref=e1496]:
                - link "Special effects" [ref=e1497] [cursor=pointer]:
                  - /url: /wiki/Special_effect
                - text: animation
            - listitem [ref=e1498]:
              - generic [ref=e1499]:
                - link "2.5D" [ref=e1500] [cursor=pointer]:
                  - /url: /wiki/2.5D
                - text: "Animation:"
              - text: A mix of 2D and 3D animation elements that emphasize the illusion of depth utilizing the pseudo-3D effect.
              - superscript [ref=e1501]:
                - link "[153]" [ref=e1502] [cursor=pointer]:
                  - /url: "#cite_note-153"
              - text: During the 1970s, the term "2.5D" started to gain recognition.
              - superscript [ref=e1503]:
                - link "[154]" [ref=e1504] [cursor=pointer]:
                  - /url: "#cite_note-www.vfxapprentice.com-154"
              - text: But its background comes from anime and manga during the 1920s where theatrical stage productions were popular.
              - superscript [ref=e1505]:
                - link "[155]" [ref=e1506] [cursor=pointer]:
                  - /url: "#cite_note-155"
              - text: Stage adaptations of well-liked anime series featured live performances by voice actors called 2.5D.
              - superscript [ref=e1507]:
                - link "[154]" [ref=e1508] [cursor=pointer]:
                  - /url: "#cite_note-www.vfxapprentice.com-154"
