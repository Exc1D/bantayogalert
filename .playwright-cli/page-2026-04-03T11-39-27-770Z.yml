                  - text: ", 1926) and"
                  - link "Princes et Princesses" [ref=e1140] [cursor=pointer]:
                    - /url: /wiki/Princes_et_Princesses
                  - text: (France, 2000).
                - term [ref=e1141]:
                  - link "Paper craft animation" [ref=e1142] [cursor=pointer]:
                    - /url: /wiki/Paper_craft
                - definition [ref=e1143]:
                  - text: a stop motion animation using
                  - link "Construction paper" [ref=e1144] [cursor=pointer]:
                    - /url: /wiki/Construction_paper
                  - text: or
                  - link "Card stock" [ref=e1145] [cursor=pointer]:
                    - /url: /wiki/Card_stock
                  - text: by doing cutting, folding, gluing and assembling.
          - generic [ref=e1146]:
            - term [ref=e1147]:
              - link "Model animation" [ref=e1148] [cursor=pointer]:
                - /url: /wiki/Model_animation
            - definition [ref=e1149]:
              - text: Stop-motion animation created to interact with and exist as a part of a live-action world.
              - superscript [ref=e1150]:
                - link "[100]" [ref=e1151] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEHarryhausenDalton20089–11-100"
              - text: Intercutting,
              - link "matte" [ref=e1152] [cursor=pointer]:
                - /url: /wiki/Matte_(filmmaking)
              - text: effects and split screens are often employed to blend stop-motion characters or objects with live actors and settings.
              - superscript [ref=e1153]:
                - link "[101]" [ref=e1154] [cursor=pointer]:
                  - /url: "#cite_note-Harryhausen-2-101"
              - text: Examples include the work of
              - link "Ray Harryhausen" [ref=e1155] [cursor=pointer]:
                - /url: /wiki/Ray_Harryhausen
              - text: ", as seen in films,"
              - link "Jason and the Argonauts" [ref=e1157] [cursor=pointer]:
                - /url: /wiki/Jason_and_the_Argonauts_(1963_film)
              - text: (1963),
              - superscript [ref=e1158]:
                - link "[102]" [ref=e1159] [cursor=pointer]:
                  - /url: "#cite_note-Harryhausen-102"
              - text: and the work of
              - link "Willis H. O'Brien" [ref=e1160] [cursor=pointer]:
                - /url: /wiki/Willis_H._O%27Brien
              - text: on films,
              - link "King Kong" [ref=e1162] [cursor=pointer]:
                - /url: /wiki/King_Kong_(1933_film)
              - text: (1933).
              - generic [ref=e1163]:
                - term [ref=e1164]:
                  - link "Go motion" [ref=e1165] [cursor=pointer]:
                    - /url: /wiki/Go_motion
                - definition [ref=e1166]:
                  - text: A variant of model animation that uses various techniques to create
                  - link "motion blur" [ref=e1167] [cursor=pointer]:
                    - /url: /wiki/Motion_blur
                  - text: between frames of film, which is not present in traditional stop motion.
                  - superscript [ref=e1168]:
                    - link "[103]" [ref=e1169] [cursor=pointer]:
                      - /url: "#cite_note-FOOTNOTESmith198690-103"
                  - text: The technique was invented by
                  - link "Industrial Light & Magic" [ref=e1170] [cursor=pointer]:
                    - /url: /wiki/Industrial_Light_%26_Magic
                  - text: and
                  - link "Phil Tippett" [ref=e1171] [cursor=pointer]:
                    - /url: /wiki/Phil_Tippett
                  - text: to create
                  - link "special effect" [ref=e1172] [cursor=pointer]:
                    - /url: /wiki/Special_effect
                  - text: scenes for the film
                  - 'link "Star Wars: Episode V – The Empire Strikes Back" [ref=e1174] [cursor=pointer]':
                    - /url: /wiki/Star_Wars:_Episode_V_%E2%80%93_The_Empire_Strikes_Back
                  - text: (1980).
                  - superscript [ref=e1175]:
                    - link "[104]" [ref=e1176] [cursor=pointer]:
                      - /url: "#cite_note-FOOTNOTEWatercutter2012-104"
                  - text: Another example is the dragon named "Vermithrax" from the 1981 film
                  - link "Dragonslayer" [ref=e1178] [cursor=pointer]:
                    - /url: /wiki/Dragonslayer_(1981_film)
                  - text: .
                  - superscript [ref=e1179]:
                    - link "[105]" [ref=e1180] [cursor=pointer]:
                      - /url: "#cite_note-FOOTNOTESmith198691–95-105"
          - generic [ref=e1181]:
            - term [ref=e1182]:
              - link "Object animation" [ref=e1183] [cursor=pointer]:
                - /url: /wiki/Object_animation
            - definition [ref=e1184]:
              - text: The use of regular inanimate objects in stop-motion animation, as opposed to specially created items.
              - superscript [ref=e1185]:
                - link "[106]" [ref=e1186] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTELaybourne199851–57-106"
              - generic [ref=e1187]:
                - term [ref=e1188]:
                  - link "Graphic animation" [ref=e1189] [cursor=pointer]:
                    - /url: /wiki/Graphic_animation
                - definition [ref=e1190]:
                  - text: Uses non-drawn flat visual graphic material (photographs, newspaper clippings, magazines, etc.), which are sometimes manipulated frame by frame to create movement.
                  - superscript [ref=e1191]:
                    - link "[107]" [ref=e1192] [cursor=pointer]:
                      - /url: "#cite_note-FOOTNOTELaybourne1998128-107"
                  - text: At other times, the graphics remain stationary, while the stop-motion camera is moved to create on-screen action.
                - term [ref=e1193]:
                  - link "Brickfilm" [ref=e1194] [cursor=pointer]:
                    - /url: /wiki/Brickfilm
                - definition [ref=e1195]:
                  - text: A subgenre of object animation involving using
                  - link "Lego" [ref=e1196] [cursor=pointer]:
                    - /url: /wiki/Lego
                  - text: or other similar brick toys to make an animation.
                  - superscript [ref=e1197]:
                    - link "[108]" [ref=e1198] [cursor=pointer]:
                      - /url: "#cite_note-FOOTNOTEPaul2005357–63-108"
                  - superscript [ref=e1199]:
                    - link "[109]" [ref=e1200] [cursor=pointer]:
                      - /url: "#cite_note-FOOTNOTEHerman2014-109"
                  - text: These have had a recent boost in popularity with the advent of video sharing sites,
                  - link "YouTube" [ref=e1201] [cursor=pointer]:
                    - /url: /wiki/YouTube
                  - text: and the availability of cheap cameras and
                  - link "animation software" [ref=e1202] [cursor=pointer]:
                    - /url: /wiki/Animation_software
                  - text: .
                  - superscript [ref=e1203]:
                    - link "[110]" [ref=e1204] [cursor=pointer]:
                      - /url: "#cite_note-110"
          - generic [ref=e1205]:
            - term [ref=e1206]:
              - link "Pixilation" [ref=e1207] [cursor=pointer]:
                - /url: /wiki/Pixilation
            - definition [ref=e1208]:
              - text: Involves the use of live humans as stop-motion characters.
              - superscript [ref=e1209]:
                - link "[111]" [ref=e1210] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTELaybourne199875–79-111"
              - text: This allows for a number of surreal effects, including disappearances and reappearances, allowing people to appear to slide across the ground, and other effects.
              - superscript [ref=e1211]:
                - link "[111]" [ref=e1212] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTELaybourne199875–79-111"
              - text: Examples of pixilation include
              - link "The Secret Adventures of Tom Thumb" [ref=e1214] [cursor=pointer]:
                - /url: /wiki/The_Secret_Adventures_of_Tom_Thumb
              - text: and
              - link "Angry Kid" [ref=e1216] [cursor=pointer]:
                - /url: /wiki/Angry_Kid
              - text: shorts, and the
              - link "Academy Award" [ref=e1217] [cursor=pointer]:
                - /url: /wiki/Academy_Award
              - text: "-winning"
              - link "Neighbours" [ref=e1219] [cursor=pointer]:
                - /url: /wiki/Neighbours_(1952_film)
              - text: by
              - link "Norman McLaren" [ref=e1220] [cursor=pointer]:
                - /url: /wiki/Norman_McLaren
              - text: .
          - generic [ref=e1221]:
            - heading "Computer" [level=3] [ref=e1222]
            - generic [ref=e1223]:
              - text: "["
              - link "edit" [ref=e1224] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=23
              - text: "]"
          - note [ref=e1225]:
            - text: "Main article:"
            - link "Computer animation" [ref=e1226] [cursor=pointer]:
              - /url: /wiki/Computer_animation
          - paragraph [ref=e1227]:
            - text: Computer animation encompasses a variety of techniques, the unifying factor being that the animation is created digitally on a computer.
            - superscript [ref=e1228]:
              - link "[71]" [ref=e1229] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTECulhane1990296-71"
            - superscript [ref=e1230]:
              - link "[112]" [ref=e1231] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTESerenko2007-112"
            - text: 2D animation techniques tend to focus on image manipulation while 3D techniques usually build virtual worlds in which characters and objects move and interact.
            - superscript [ref=e1232]:
              - link "[113]" [ref=e1233] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMasson2007405-113"
            - text: 3D animation can create images that seem real to the viewer.
            - superscript [ref=e1234]:
              - link "[114]" [ref=e1235] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTESerenko2007482-114"
          - generic [ref=e1236]:
            - heading "2D" [level=4] [ref=e1237]
            - generic [ref=e1238]:
              - text: "["
              - link "edit" [ref=e1239] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=24
              - text: "]"
          - note [ref=e1240]:
            - text: "Main article:"
            - link "2D computer graphics" [ref=e1241] [cursor=pointer]:
              - /url: /wiki/2D_computer_graphics
          - figure "A 2D animation of two circles joined by a chain" [ref=e1242]:
            - link [ref=e1243] [cursor=pointer]:
              - /url: /wiki/File:Catenary_animation.gif
              - img [ref=e1244]
            - generic [ref=e1245]: A 2D animation of two circles joined by a chain
          - paragraph [ref=e1246]:
            - link "2D animation" [ref=e1247] [cursor=pointer]:
              - /url: /wiki/2D_computer_graphics
            - text: figures are created or edited on the computer using 2D
            - link "bitmap graphics" [ref=e1248] [cursor=pointer]:
              - /url: /wiki/Raster_graphics
            - text: and 2D
            - link "vector graphics" [ref=e1249] [cursor=pointer]:
              - /url: /wiki/Vector_graphics
            - text: .
            - superscript [ref=e1250]:
              - link "[115]" [ref=e1251] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMasson2007165-115"
            - text: This includes automated computerized versions of traditional animation techniques,
            - link "interpolated" [ref=e1252] [cursor=pointer]:
              - /url: /wiki/Interpolation
            - link "morphing" [ref=e1253] [cursor=pointer]:
              - /url: /wiki/Morphing
            - text: ","
            - superscript [ref=e1254]:
              - link "[116]" [ref=e1255] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTESito201332,_70,_132-116"
            - link "onion skinning" [ref=e1256] [cursor=pointer]:
              - /url: /wiki/Onion_skinning
            - superscript [ref=e1257]:
              - link "[117]" [ref=e1258] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEPriebe200671–72-117"
            - text: and interpolated rotoscoping. 2D animation has many applications, including After Effects Animation,
            - link "analog computer animation" [ref=e1259] [cursor=pointer]:
              - /url: /wiki/Scanimate
            - text: ","
            - link "Flash animation" [ref=e1260] [cursor=pointer]:
              - /url: /wiki/Flash_animation
            - text: ", and"
            - link "PowerPoint animation" [ref=e1261] [cursor=pointer]:
              - /url: /wiki/PowerPoint_animation
            - text: .
            - link "Cinemagraphs" [ref=e1262] [cursor=pointer]:
              - /url: /wiki/Cinemagraph
            - text: are
            - link "still photographs" [ref=e1263] [cursor=pointer]:
              - /url: /wiki/Still_life_photography
            - text: in the form of an
            - link "animated GIF" [ref=e1264] [cursor=pointer]:
              - /url: /wiki/Animated_GIF
            - text: file of which part is animated.
            - superscript [ref=e1265]:
              - link "[118]" [ref=e1266] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEWhite2006392-118"
          - paragraph [ref=e1267]:
            - text: Final line
            - link "advection" [ref=e1268] [cursor=pointer]:
              - /url: /wiki/Advection
            - text: animation is a technique used in 2D animation,
            - superscript [ref=e1269]:
              - link "[119]" [ref=e1270] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTELoweSchnotz2008246–47-119"
            - text: to give artists and animators more influence and control over the final product as everything is done within the same department.
            - superscript [ref=e1271]:
              - link "[120]" [ref=e1272] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMasson2007127–28-120"
            - text: Speaking about using this approach in
            - link "Paperman" [ref=e1274] [cursor=pointer]:
              - /url: /wiki/Paperman
            - text: ", John Kahrs said that \"Our animators can change things, actually erase away the CG underlayer if they want, and change the profile of the arm.\""
            - superscript [ref=e1275]:
              - link "[121]" [ref=e1276] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEBeck2012-121"
          - paragraph [ref=e1277]:
            - text: When working with game animations,
            - link "skeletal" [ref=e1278] [cursor=pointer]:
              - /url: /wiki/Skeletal_animation
            - text: 2D animations are commonly created using tools like Spine, DragonBones, Blender COA Tools, Rive, and the built-in Unity editor. The primary benefit of this approach is the ability to reuse images, which reduces the amount of graphics stored in RAM. This principle of maximizing resource efficiency means that by reusing existing elements, you can enhance the visual appeal of animations without needing to create additional graphics.
            - superscript [ref=e1279]:
              - link "[122]" [ref=e1280] [cursor=pointer]:
                - /url: "#cite_note-122"
          - generic [ref=e1281]:
            - heading "3D" [level=4] [ref=e1282]
            - generic [ref=e1283]:
              - text: "["
              - link "edit" [ref=e1284] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=25
              - text: "]"
          - note [ref=e1285]:
            - text: "Main articles:"
            - link "Computer animation" [ref=e1286] [cursor=pointer]:
              - /url: /wiki/Computer_animation
            - text: and
            - link "3D computer graphics" [ref=e1287] [cursor=pointer]:
              - /url: /wiki/3D_computer_graphics
          - figure "Caminandes | Llama Drama" [ref=e1288]:
            - button "Play video" [ref=e1292] [cursor=pointer]
            - link:
              - /url: /wiki/File:Caminandes-_Llama_Drama_-_Short_Movie.ogv
            - generic [ref=e1294]: Caminandes | Llama Drama
          - paragraph [ref=e1295]:
            - text: 3D animation is digitally modeled and manipulated by an animator. The 3D model maker usually starts by creating a 3D
            - link "polygon mesh" [ref=e1296] [cursor=pointer]:
              - /url: /wiki/Polygon_mesh
            - text: for the animator to manipulate.
            - superscript [ref=e1297]:
              - link "[123]" [ref=e1298] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMasson200788-123"
            - text: A mesh typically includes many vertices that are connected by edges and faces, which give the visual appearance of form to a 3D object or 3D environment.
            - superscript [ref=e1299]:
              - link "[123]" [ref=e1300] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMasson200788-123"
            - text: Sometimes, the mesh is given an internal digital skeletal structure called an
            - link "armature" [ref=e1301] [cursor=pointer]:
              - /url: /wiki/Armature_(computer_animation)
            - text: that can be used to control the mesh by weighting the vertices.
            - superscript [ref=e1302]:
              - link "[124]" [ref=e1303] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTESito2013208-124"
            - superscript [ref=e1304]:
              - link "[125]" [ref=e1305] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMasson200778–80-125"
            - text: This process is called rigging and can be used in conjunction with
            - link "key frames" [ref=e1306] [cursor=pointer]:
              - /url: /wiki/Key_frame
            - text: to create movement.
            - superscript [ref=e1307]:
              - link "[126]" [ref=e1308] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTESito2013285-126"
          - paragraph [ref=e1309]:
            - text: Other techniques can be applied, mathematical functions (e.g., gravity, particle simulations), simulated fur or hair, and effects, fire and
            - link "water simulations" [ref=e1310] [cursor=pointer]:
              - /url: /wiki/Fluid_animation
            - text: .
            - superscript [ref=e1311]:
              - link "[127]" [ref=e1312] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMasson200796-127"
            - text: These techniques fall under the category of 3D dynamics.
            - superscript [ref=e1313]:
              - link "[128]" [ref=e1314] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTELoweSchnotz200892-128"
          - generic [ref=e1315]:
            - heading "Terms" [level=5] [ref=e1316]
            - generic [ref=e1317]:
              - text: "["
              - link "edit" [ref=e1318] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=26
              - text: "]"
          - list [ref=e1319]:
            - listitem [ref=e1320]:
              - link "Cel shading" [ref=e1322] [cursor=pointer]:
                - /url: /wiki/Cel_shading
              - text: is used to mimic traditional animation using computer software.
              - superscript [ref=e1323]:
                - link "[129]" [ref=e1324] [cursor=pointer]:
                  - /url: "#cite_note-129"
              - text: The shading looks stark, with less blending of colors. Examples include
              - link "Skyland" [ref=e1326] [cursor=pointer]:
                - /url: /wiki/Skyland
              - text: (2007, France),
              - link "The Iron Giant" [ref=e1328] [cursor=pointer]:
                - /url: /wiki/The_Iron_Giant
              - text: (1999, U.S.),
              - link "Futurama" [ref=e1330] [cursor=pointer]:
                - /url: /wiki/Futurama
              - text: (1999, U.S.)
              - link "Appleseed Ex Machina" [ref=e1332] [cursor=pointer]:
                - /url: /wiki/Appleseed_Ex_Machina
              - text: (2007, Japan),
              - 'link "The Legend of Zelda: The Wind Waker" [ref=e1334] [cursor=pointer]':
                - /url: /wiki/The_Legend_of_Zelda:_The_Wind_Waker
              - text: (2002, Japan),
              - 'link "The Legend of Zelda: Breath of the Wild" [ref=e1336] [cursor=pointer]':
                - /url: /wiki/The_Legend_of_Zelda:_Breath_of_the_Wild
              - text: (2017, Japan)
            - listitem [ref=e1337]:
              - link "Machinima" [ref=e1339] [cursor=pointer]:
                - /url: /wiki/Machinima
              - text: – Films created by screen capturing in video games and virtual worlds. The term originated from the software introduction in the 1980s
              - link "demoscene" [ref=e1340] [cursor=pointer]:
                - /url: /wiki/Demoscene
              - text: ", as well as the 1990s recordings of the"
              - link "first-person shooter" [ref=e1341] [cursor=pointer]:
                - /url: /wiki/First-person_shooter
              - text: video game
              - link "Quake" [ref=e1343] [cursor=pointer]:
                - /url: /wiki/Quake_(video_game)
              - text: .
            - listitem [ref=e1344]:
              - link "Motion capture" [ref=e1346] [cursor=pointer]:
                - /url: /wiki/Motion_capture
              - text: is used when live-action actors wear special suits that allow computers to copy their movements into CG characters.
              - superscript [ref=e1347]:
                - link "[130]" [ref=e1348] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTESito2013207–08-130"
              - superscript [ref=e1349]:
                - link "[131]" [ref=e1350] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEMasson2007204-131"
              - text: Examples include
              - link "Polar Express" [ref=e1352] [cursor=pointer]:
                - /url: /wiki/The_Polar_Express_(film)
              - text: (2004, US),
              - link "Beowulf" [ref=e1354] [cursor=pointer]:
                - /url: /wiki/Beowulf_(2007_film)
              - text: (2007, US),
              - link "A Christmas Carol" [ref=e1356] [cursor=pointer]:
                - /url: /wiki/A_Christmas_Carol_(2009_film)
              - text: (2009, US),
              - link "The Adventures of Tintin" [ref=e1358] [cursor=pointer]:
                - /url: /wiki/The_Adventures_of_Tintin_(film)
              - text: (2011, US)
              - link "kochadiiyan" [ref=e1360] [cursor=pointer]:
                - /url: /wiki/Kochadaiiyaan
              - text: (2014, India)
            - listitem [ref=e1361]:
              - link "Computer animation" [ref=e1363] [cursor=pointer]:
                - /url: /wiki/Computer_animation
              - text: is used primarily for animation that attempts to resemble real life while having a stylized cartoonish appearance, using advanced rendering that mimics in detail skin, plants, water, fire, clouds, etc.
              - superscript [ref=e1364]:
                - link "[132]" [ref=e1365] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEParent200719-132"
              - text: Examples include
              - link "Up" [ref=e1367] [cursor=pointer]:
                - /url: /wiki/Up_(2009_film)
              - text: (2009, US),
              - link "How to Train Your Dragon" [ref=e1369] [cursor=pointer]:
                - /url: /wiki/How_to_Train_Your_Dragon_(2010_film)
              - text: (2010, US)
            - listitem [ref=e1370]:
              - link "Physically based animation" [ref=e1372] [cursor=pointer]:
                - /url: /wiki/Physically_based_animation
              - text: is animation using
              - link "computer simulations" [ref=e1373] [cursor=pointer]:
                - /url: /wiki/Computer_simulation
              - text: .
              - superscript [ref=e1374]:
                - link "[133]" [ref=e1375] [cursor=pointer]:
                  - /url: "#cite_note-133"
          - generic [ref=e1376]:
            - heading "Mechanical" [level=3] [ref=e1377]
            - generic [ref=e1378]:
              - text: "["
              - link "edit" [ref=e1379] [cursor=pointer]:
                - /url: /w/index.php?title=Animation&action=edit&section=27
              - text: "]"
          - list [ref=e1380]:
            - listitem [ref=e1381]:
              - link "Animatronics" [ref=e1383] [cursor=pointer]:
                - /url: /wiki/Animatronics
              - text: is the use of
              - link "mechatronics" [ref=e1384] [cursor=pointer]:
                - /url: /wiki/Mechatronics
              - text: to create machines that seem animate rather than robotic.
              - list [ref=e1385]:
                - listitem [ref=e1386]:
                  - link "Audio-Animatronics" [ref=e1388] [cursor=pointer]:
                    - /url: /wiki/Audio-Animatronics
                  - text: is a form of
                  - link "robotics" [ref=e1389] [cursor=pointer]:
                    - /url: /wiki/Robotics
                  - text: animation, combined with 3-D animation, created by
                  - link "Walt Disney Imagineering" [ref=e1390] [cursor=pointer]:
                    - /url: /wiki/Walt_Disney_Imagineering
                  - text: for shows and attractions at Disney theme parks move and make noise (generally a recorded speech or song).
                  - superscript [ref=e1391]:
                    - link "[134]" [ref=e1392] [cursor=pointer]:
                      - /url: "#cite_note-FOOTNOTEPilling1997249-134"
                  - text: They are fixed to whatever supports them. They can sit and stand, and they cannot walk. An Audio-Animatron is different from an
                  - link "android" [ref=e1393] [cursor=pointer]:
                    - /url: /wiki/Android_(robot)
                  - text: "-type robot in that it uses prerecorded movements and sounds, rather than responding to external stimuli. In 2009, Disney created an interactive version of the technology called Autonomatronics."
                  - superscript [ref=e1394]:
                    - link "[135]" [ref=e1395] [cursor=pointer]:
                      - /url: "#cite_note-FOOTNOTEO'Keefe2014-135"
                - listitem [ref=e1396]:
                  - link "Linear Animation Generator" [ref=e1398] [cursor=pointer]:
                    - /url: /wiki/Linear_alternator
                  - text: is a form of animation by using static picture frames installed in a tunnel or a shaft. The animation illusion is created by putting the viewer in a linear motion, parallel to the installed picture frames.
                  - superscript [ref=e1399]:
                    - link "[136]" [ref=e1400] [cursor=pointer]:
                      - /url: "#cite_note-FOOTNOTEParent200722–23-136"
            - listitem [ref=e1401]:
              - link "Chuckimation" [ref=e1403] [cursor=pointer]:
                - /url: /wiki/Chuckimation
              - text: is a type of animation created by the makers of the television series
              - link "Action League Now!" [ref=e1405] [cursor=pointer]:
                - /url: /wiki/Action_League_Now!
              - text: in which characters/props are thrown, or chucked from off camera or wiggled around to simulate talking by unseen hands.
              - superscript [ref=e1406]:
                - link "[137]" [ref=e1407] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEKenyon1998-137"
            - listitem [ref=e1408]:
              - text: The
              - link "magic lantern" [ref=e1410] [cursor=pointer]:
                - /url: /wiki/Magic_lantern
              - text: used mechanical slides to project moving images.
              - link "Christiaan Huygens" [ref=e1411] [cursor=pointer]:
                - /url: /wiki/Christiaan_Huygens
              - text: was thought to have invented the magic lantern in the mid-1600s.
              - superscript [ref=e1412]:
                - link "[138]" [ref=e1413] [cursor=pointer]:
                  - /url: "#cite_note-138"
