        - region "Accessibility" [ref=e393]:
          - heading "Accessibility" [level=2] [ref=e394]:
            - link "Accessibility" [ref=e395] [cursor=pointer]:
              - /url: "#accessibility"
          - paragraph [ref=e396]: Blinking and flashing animation can be problematic for people with cognitive concerns such as Attention Deficit Hyperactivity Disorder (ADHD). Additionally, certain kinds of motion can be a trigger for Vestibular disorders, epilepsy, and migraine and Scotopic sensitivity.
          - paragraph [ref=e397]:
            - text: Consider providing a mechanism for pausing or disabling animation as well as using the
            - link "Reduced Motion Media Query" [ref=e398] [cursor=pointer]:
              - /url: /en-US/docs/Web/CSS/Reference/At-rules/@media/prefers-reduced-motion
            - text: to create a complimentary experience for users who have expressed a preference for reduced animated experiences.
          - list [ref=e399]:
