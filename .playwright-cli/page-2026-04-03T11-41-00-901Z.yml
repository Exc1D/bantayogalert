            - code [ref=e779]:
              - text: ":root { overflow: hidden; background-color: lightblue; display: flex; justify-content: center; } .sun { background-color: yellow; border-radius: 50%; height: 100vh; aspect-ratio: 1 / 1; /* animations declared later in the cascade will override the properties of previously declared animations */ /* bounce 'overwrites' the transform set by rise, hence the sun only moves horizontally */ animation: 4s linear 0s infinite alternate rise, 4s linear 0s infinite alternate bounce; }"
              - generic [ref=e780]: "@keyframes rise"
              - text: "{ from { transform: translateY(110vh); } to { transform: translateY(0); } }"
              - generic [ref=e781]: "@keyframes bounce"
              - text: "{ from { transform: translateX(-50vw); } to { transform: translateX(50vw); } }"
