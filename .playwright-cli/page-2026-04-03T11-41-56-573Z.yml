        - heading "CSS transitions" [level=1] [ref=e83]
        - generic [ref=e84]:
          - paragraph [ref=e85]:
            - text: The
            - strong [ref=e86]: CSS transitions
            - text: module specifies functionality for creating gradual transitions between different CSS property values. The behavior of these transitions can be controlled by specifying their easing function, duration, and other values.
          - paragraph [ref=e87]: Normally, when the value of a CSS property changes, the result of the change from the old value to the new value is immediate. The CSS transitions module enables controlling a progression from the old property state to the new state over a specified period of time. It also provides event handlers to allow code to be run in response to different stages of a transition being reached.
          - paragraph [ref=e88]:
            - text: In certain cases, there is no originating "from" value for a transition. For example, if an element gets added to the DOM, the styles defined are for the "to" state. This module provides the
            - link "@starting-style" [ref=e89] [cursor=pointer]:
              - /url: /en-US/docs/Web/CSS/Reference/At-rules/@starting-style
              - code [ref=e90]: "@starting-style"
            - text: at-rule, which enables defining starting styles for such cases. The module also defines how discrete property values should be transitioned, such as transitioning the discretely animated
            - link "display" [ref=e91] [cursor=pointer]:
              - /url: /en-US/docs/Web/CSS/Reference/Properties/display
              - code [ref=e92]: display
            - text: property from the
            - code [ref=e93]: none
            - text: value to a displayed value.
