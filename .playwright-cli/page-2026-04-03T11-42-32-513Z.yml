            - text: Before starting this module, you should have a basic work environment set up (as detailed in
            - link "Installing basic software" [ref=e109] [cursor=pointer]:
              - /url: /en-US/docs/Learn_web_development/Getting_started/Environment_setup/Installing_software
            - text: ), and understand how to create and manage files (as detailed in
            - link "Dealing with files" [ref=e110] [cursor=pointer]:
              - /url: /en-US/docs/Learn_web_development/Getting_started/Environment_setup/Dealing_with_files
            - text: ). You should also be familiar with HTML (work through our
            - link "Structuring content with HTML" [ref=e111] [cursor=pointer]:
              - /url: /en-US/docs/Learn_web_development/Core/Structuring_content
            - text: module if not).
          - paragraph [ref=e113]:
            - strong [ref=e114]: "Note:"
            - text: If you are working on a computer, tablet, or another device where you can't create files, you can try running the code in an online editor such as
            - link "CodePen (external)" [ref=e115] [cursor=pointer]:
              - /url: https://codepen.io/
            - text: or
            - link "JSFiddle (external)" [ref=e116] [cursor=pointer]:
              - /url: https://jsfiddle.net/
            - text: .
        - region "Tutorials and challenges" [ref=e117]:
          - heading "Tutorials and challenges" [level=2] [ref=e118]:
            - link "Tutorials and challenges" [ref=e119] [cursor=pointer]:
              - /url: "#tutorials_and_challenges"
          - generic [ref=e120]:
            - term [ref=e121]:
              - link "What is CSS?" [ref=e122] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/What_is_CSS
            - definition [ref=e123]:
              - paragraph [ref=e124]: CSS allows you to create great-looking web pages, but how does it work under the hood? This article explains what CSS is, what the basic syntax looks like, and how your browser applies CSS to HTML to style it.
            - term [ref=e125]:
              - link "Getting started with CSS" [ref=e126] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Getting_started
            - definition [ref=e127]:
              - paragraph [ref=e128]: In this article, we will take a simple HTML document and apply CSS to it, learning some practical details of the language along the way. We will also review the CSS syntax features you've not looked at yet.
            - term [ref=e129]:
              - link "Styling a biography page" [ref=e130] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Styling_a_bio_page
              - superscript [ref=e131]: Challenge
            - definition [ref=e132]:
              - paragraph [ref=e133]: In this challenge you will style a simple biography page, testing you on some of the skills you learned in the last couple of lessons including writing selectors, coloring backgrounds, and text styling. We will also invite you to look up some basic CSS features that we haven't covered, to test your research skills.
            - term [ref=e134]:
              - link "Basic CSS selectors" [ref=e135] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Basic_selectors
            - definition [ref=e136]:
              - paragraph [ref=e137]: In this article we'll recap some selector fundamentals, including the basic type, class, and ID selectors.
            - term [ref=e138]:
              - link "Attribute selectors" [ref=e139] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Attribute_selectors
            - definition [ref=e140]:
              - paragraph [ref=e141]: As you know from your study of HTML, elements can have attributes that give further detail about the element being marked up. In CSS you can use attribute selectors to target elements with certain attributes. This lesson will show you how to use these very useful selectors.
            - term [ref=e142]:
              - link "Pseudo-classes and pseudo-elements" [ref=e143] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Pseudo_classes_and_elements
            - definition [ref=e144]:
              - paragraph [ref=e145]:
                - text: The next set of selectors we will look at are referred to as
                - strong [ref=e146]: pseudo-classes
                - text: and
                - strong [ref=e147]: pseudo-elements
                - text: . There are a large number of these, and they often serve quite specific purposes. Once you know how to use them, you can look through the different types to see if there is something which works for the task you are trying to achieve.
            - term [ref=e148]:
              - link "Combinators" [ref=e149] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Combinators
            - definition [ref=e150]:
              - paragraph [ref=e151]: The final selectors we will look at are called combinators. Combinators are used to combine other selectors in a way that allows us to select elements based on their location in the DOM relative to other elements (for example, child or sibling).
            - term [ref=e152]:
              - link "The box model" [ref=e153] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Box_model
            - definition [ref=e154]:
              - paragraph [ref=e155]:
                - text: Everything in CSS has a box around it, and understanding these boxes is key to being able to create more complex layouts with CSS, or to align items with other items. In this lesson, we will take a look at the CSS
                - emphasis [ref=e156]: Box model
                - text: . You'll get an understanding of how it works and the terminology that relates to it.
            - term [ref=e157]:
              - link "Handling conflicts" [ref=e158] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Handling_conflicts
            - definition [ref=e159]:
              - paragraph [ref=e160]: The aim of this lesson is to develop your understanding of some of the most fundamental concepts of CSS — the cascade, specificity, and inheritance — which control how CSS is applied to HTML and how conflicts between style declarations are resolved.
            - term [ref=e161]:
              - link "Fixing blog page styles" [ref=e162] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Fixing_blog_styles
              - superscript [ref=e163]: Challenge
            - definition [ref=e164]:
              - paragraph [ref=e165]: In this challenge we give you a basic blog page example that is partially styled. We need you to fix some problems with the existing CSS and add some styles to finish it off. Along the way we will test your knowledge of selectors, the box model, and conflicts/cascade.
            - term [ref=e166]:
              - link "Values and units" [ref=e167] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Values_and_units
            - definition [ref=e168]:
              - paragraph [ref=e169]:
                - text: CSS rules contain
                - link "declarations" [ref=e170] [cursor=pointer]:
                  - /url: /en-US/docs/Web/CSS/Guides/Syntax/Introduction#css_declarations
                - text: ", which in turn are composed of properties and values. Each property used in CSS has a"
                - strong [ref=e171]: value type
                - text: that describes what kind of values it is allowed to have. In this lesson, we will take a look at some of the most frequently used value types, what they are, and how they work.
            - term [ref=e172]:
              - link "Sizing items in CSS" [ref=e173] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Sizing
            - definition [ref=e174]:
              - paragraph [ref=e175]: Understanding how big the different features in your design will be is important. In this lesson we will summarize the various ways elements get a size via CSS and define a few terms about sizing that will help you in the future.
            - term [ref=e176]:
              - link "Backgrounds and borders" [ref=e177] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Backgrounds_and_borders
            - definition [ref=e178]:
              - paragraph [ref=e179]: In this lesson, we will take a look at some of the creative things you can do with CSS backgrounds and borders. From adding gradients, background images, and rounded corners, backgrounds and borders are the answer to a lot of styling questions in CSS.
            - term [ref=e180]:
              - 'link "Challenge: Sizing and decorating a content panel" [ref=e181] [cursor=pointer]':
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Size_decorate_content_panel
              - superscript [ref=e182]: Challenge
            - definition [ref=e183]:
              - paragraph [ref=e184]: In this challenge you are provided with a lightly styled page structure that renders a content panel, with a heading at the top and a button bar at the bottom. We want you to follow the instructions to size and decorate it, producing an interesting layout as a result. Along the way, we'll test your knowledge of CSS values and units, sizing, and backgrounds and borders.
            - term [ref=e185]:
              - link "Overflowing content" [ref=e186] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Overflow
            - definition [ref=e187]:
              - paragraph [ref=e188]: Overflow is what happens when there is too much content to fit inside an element box. In this lesson, you will learn how to manage overflow using CSS.
            - term [ref=e189]:
              - link "Images, media, and form elements" [ref=e190] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Images_media_forms
            - definition [ref=e191]:
              - paragraph [ref=e192]: In this lesson we will take a look at how certain special elements are treated in CSS. Images, other media, and form elements behave a little differently from regular boxes in terms of your ability to style them with CSS. Understanding what is and isn't possible can save some frustration, and this lesson will highlight some of the main things that you need to know.
            - term [ref=e193]:
              - link "Styling tables" [ref=e194] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Tables
            - definition [ref=e195]:
              - paragraph [ref=e196]: Styling an HTML table isn't the most glamorous job in the world, but sometimes we all have to do it. This article explains how to make HTML tables look good, with some specific table styling techniques highlighted.
            - term [ref=e197]:
              - link "Debugging CSS" [ref=e198] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Debugging_CSS
            - definition [ref=e199]:
              - paragraph [ref=e200]: This article will give you guidance on how to go about debugging a CSS problem, and show you how the DevTools included in all modern browsers can help you to find out what is going on.
        - region "Test your skills" [ref=e201]:
          - heading "Test your skills" [level=2] [ref=e202]:
            - link "Test your skills" [ref=e203] [cursor=pointer]:
              - /url: "#test_your_skills"
          - paragraph [ref=e204]:
            - text: You will find "Test your skills" articles placed between the tutorial articles to check whether you have retained the most important information before you move on. If you want to explore all of these together, you can find them listed at
            - 'link "Test your skills: CSS styling basics" [ref=e205] [cursor=pointer]':
              - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Test_your_skills
            - text: .
        - region "Additional tutorials" [ref=e206]:
          - heading "Additional tutorials" [level=2] [ref=e207]:
            - link "Additional tutorials" [ref=e208] [cursor=pointer]:
              - /url: "#additional_tutorials"
          - paragraph [ref=e209]: These tutorials are not part of the learning pathway, but they are interesting nonetheless — you should consider these as stretch goals, to optionally study when you are done with the main Core articles.
          - generic [ref=e210]:
            - term [ref=e211]:
              - link "Advanced styling effects" [ref=e212] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Advanced_styling_effects
            - definition [ref=e213]:
              - paragraph [ref=e214]: This article acts as a box of tricks, providing an introduction to some interesting advanced styling features such as box shadows, blend modes, and filters.
            - term [ref=e215]:
              - link "Cascade layers" [ref=e216] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Cascade_layers
            - definition [ref=e217]:
              - paragraph [ref=e218]:
                - text: This lesson aims to introduce you to
                - link "cascade layers" [ref=e219] [cursor=pointer]:
                  - /url: /en-US/docs/Web/CSS/Reference/At-rules/@layer
                - text: ", a more advanced feature that builds on the fundamental concepts of the"
                - link "CSS cascade" [ref=e220] [cursor=pointer]:
                  - /url: /en-US/docs/Web/CSS/Guides/Cascade/Introduction
                - text: and
                - link "CSS specificity" [ref=e221] [cursor=pointer]:
                  - /url: /en-US/docs/Web/CSS/Guides/Cascade/Specificity
                - text: .
            - term [ref=e222]:
              - link "Handling different text directions" [ref=e223] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Handling_different_text_directions
            - definition [ref=e224]:
              - paragraph [ref=e225]: In recent years, CSS has evolved in order to better support different directionality of content, including right-to-left but also top-to-bottom content (such as Japanese) — these different directionalities are called writing modes. As you progress in your study and begin to work with layout, an understanding of writing modes will be very helpful to you, therefore we will introduce them in this article.
            - term [ref=e226]:
              - link "Organizing CSS" [ref=e227] [cursor=pointer]:
                - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Organizing
            - definition [ref=e228]:
              - paragraph [ref=e229]: As you start to work on larger stylesheets and big projects you will discover that maintaining a huge CSS file can be challenging. In this article we will take a brief look at some best practices for writing your CSS to make it easily maintainable, and some of the solutions you will find in use by others to help improve maintainability.
