                  - text: Taste Skill includes 7 specialized variants instead of a single file, a 3-dial parameterization system for adjustable output, and anti-repetition rules backed by original research. It is framework-agnostic and works across all major agents.
                - paragraph [ref=e470]:
                  - strong [ref=e471]: Does it work with React, Vue, Svelte, etc.?
                  - text: Yes. Taste Skill is framework-agnostic. The rules focus on design decisions, not framework-specific code patterns.
                - paragraph [ref=e472]:
                  - strong [ref=e473]: What is a SKILL.md file?
                  - text: A portable instruction file that AI coding agents detect and follow automatically. No configuration is needed, just install it and your agent reads it.
