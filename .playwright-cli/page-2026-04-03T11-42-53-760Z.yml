                    - text: Equal to
                    - code [ref=e215]: cubic-bezier(0.0, 0.0, 1.0, 1.0)
                    - text: ", animates at an even speed."
                - term [ref=e216]:
                  - link "ease" [ref=e217] [cursor=pointer]:
                    - /url: "#ease"
                    - code [ref=e218]: ease
                - definition [ref=e219]:
                  - paragraph [ref=e220]:
                    - text: Equal to
                    - code [ref=e221]: cubic-bezier(0.25, 0.1, 0.25, 1.0)
                    - text: ", the default value, increases in velocity towards the middle of the animation, slowing back down at the end."
                - term [ref=e222]:
                  - link "ease-in" [ref=e223] [cursor=pointer]:
                    - /url: "#ease-in"
                    - code [ref=e224]: ease-in
                - definition [ref=e225]:
                  - paragraph [ref=e226]:
                    - text: Equal to
                    - code [ref=e227]: cubic-bezier(0.42, 0, 1.0, 1.0)
                    - text: ", starts off slowly, with the speed of the transition of the animating property increasing until complete."
                - term [ref=e228]:
