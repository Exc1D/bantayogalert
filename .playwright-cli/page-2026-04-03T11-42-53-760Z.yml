            - text: is specified on a keyframe, the corresponding value of
            - strong [ref=e325]:
              - code [ref=e326]: animation-timing-function
            - text: from the element to which the animation is applied is used for that keyframe.
          - paragraph [ref=e327]:
            - text: Within a keyframe,
            - code [ref=e328]: animation-timing-function
            - text: is an at-rule-specific descriptor, not the property of the same name. The timing is not being animated. Rather, a keyframe's easing function is applied on a property-by-property basis from the keyframe on which it is specified until the next keyframe specifying that property, or until the end of the animation if there is no subsequent keyframe specifying that property. As a result, an
            - strong [ref=e329]:
