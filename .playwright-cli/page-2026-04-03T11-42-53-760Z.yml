                - term [ref=e240]:
                  - link "cubic-bezier(<number [0,1]> , <number> , <number [0,1]> , <number>)" [ref=e241] [cursor=pointer]:
                    - /url: "#cubic-beziernumber_01_number_number_01_number"
                    - code [ref=e242]: cubic-bezier(<number [0,1]> , <number> , <number [0,1]> , <number>)
                - definition [ref=e243]:
                  - paragraph [ref=e244]: An author defined cubic-bezier curve, where the first and third values must be in the range of 0 to 1.
                - term [ref=e245]:
                  - 'link "linear(<number> <percentage>{1,2}, …)" [ref=e246] [cursor=pointer]':
                    - /url: "#linearnumber_percentage12_…"
                    - code [ref=e247]: "linear(<number> <percentage>{1,2}, …)"
                - definition [ref=e248]:
                  - paragraph [ref=e249]:
                    - text: The function interpolates linearly between the provided easing stop points. A stop point is a pair of an output progress and an input percentage. The input percentage is optional and is inferred if not specified. If an input percentage is not provided then the first and last stop points are set to
                    - code [ref=e250]: 0%
                    - text: and
                    - code [ref=e251]: 100%
                    - text: respectively, and the stop points in the middle receive percentage values derived by linearly interpolating between the closest previous and next points that have a percentage value.
                - term [ref=e252]:
                  - link "steps(<integer>, <step-position>)" [ref=e253] [cursor=pointer]:
                    - /url: "#stepsinteger_step-position"
                    - code [ref=e254]: steps(<integer>, <step-position>)
                - definition [ref=e255]:
                  - paragraph [ref=e256]:
                    - text: Displays an animation iteration along
                    - emphasis [ref=e257]: "n"
                    - text: stops along the transition, displaying each stop for equal lengths of time. For example, if
                    - emphasis [ref=e258]: "n"
                    - text: "is 5, there are 5 steps. Whether the animation holds temporarily at 0%, 20%, 40%, 60% and 80%, on the 20%, 40%, 60%, 80% and 100%, or makes 5 stops between the 0% and 100% along the animation, or makes 5 stops including the 0% and 100% marks (on the 0%, 25%, 50%, 75%, and 100%) depends on which of the following step position is used:"
                  - generic [ref=e259]:
                    - term [ref=e260]:
                      - link "jump-start" [ref=e261] [cursor=pointer]:
                        - /url: "#jump-start"
                        - code [ref=e262]: jump-start
                    - definition [ref=e263]:
                      - paragraph [ref=e264]: Denotes a left-continuous function, so that the first jump happens when the animation begins.
                    - term [ref=e265]:
                      - link "jump-end" [ref=e266] [cursor=pointer]:
                        - /url: "#jump-end"
                        - code [ref=e267]: jump-end
                    - definition [ref=e268]:
                      - paragraph [ref=e269]: Denotes a right-continuous function, so that the last jump happens when the animation ends. This is the default.
                    - term [ref=e270]:
                      - link "jump-none" [ref=e271] [cursor=pointer]:
                        - /url: "#jump-none"
                        - code [ref=e272]: jump-none
                    - definition [ref=e273]:
                      - paragraph [ref=e274]: There is no jump on either end, effectively removing a step during the interpolation iteration. Instead, it holds at both the 0% mark and the 100% mark, each for 1/n of the duration.
                    - term [ref=e275]:
                      - link "jump-both" [ref=e276] [cursor=pointer]:
                        - /url: "#jump-both"
                        - code [ref=e277]: jump-both
                    - definition [ref=e278]:
                      - paragraph [ref=e279]: Includes pauses at both the 0% and 100% marks, effectively adding a step during the animation iteration.
                    - term [ref=e280]:
