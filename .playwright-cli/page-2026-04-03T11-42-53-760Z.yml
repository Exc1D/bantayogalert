            - definition [ref=e199]:
              - paragraph [ref=e200]:
                - text: The easing function that corresponds to a given animation, as determined by
                - link "animation-name" [ref=e201] [cursor=pointer]:
                  - /url: /en-US/docs/Web/CSS/Reference/Properties/animation-name
                  - code [ref=e202]: animation-name
                - text: .
              - paragraph [ref=e203]:
                - text: The non-step keyword values (
                - code [ref=e204]: ease
                - text: ","
                - code [ref=e205]: linear
                - text: ","
                - code [ref=e206]: ease-in-out
                - text: ", etc.) each represent cubic Bézier curves with fixed four-point values, while the"
                - code [ref=e207]: cubic-bezier()
                - text: function value allows non-predefined values to be specified. The
                - code [ref=e208]: steps()
                - text: easing function divides the input time into a specified number of equal-length intervals. Its parameters include a number of steps and a step position.
              - generic [ref=e209]:
                - term [ref=e210]:
                  - link "linear" [ref=e211] [cursor=pointer]:
                    - /url: "#linear"
                    - code [ref=e212]: linear
                - definition [ref=e213]:
