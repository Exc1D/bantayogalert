            - code [ref=e191]: "/* Keyword values */ animation-timing-function: ease; animation-timing-function: ease-in; animation-timing-function: ease-out; animation-timing-function: ease-in-out; animation-timing-function: linear; animation-timing-function: step-start; animation-timing-function: step-end; /* cubic-bezier() function values */ animation-timing-function: cubic-bezier(0.42, 0, 1, 1); /* ease-in */ animation-timing-function: cubic-bezier(0, 0, 0.58, 1); /* ease-out */ animation-timing-function: cubic-bezier(0.42, 0, 0.58, 1); /* ease-in-out */ /* linear() function values */ animation-timing-function: linear(0, 0.25, 1); animation-timing-function: linear(0 0%, 0.25 50%, 1 100%); animation-timing-function: linear(0, 0.25 50% 75%, 1); animation-timing-function: linear(0, 0.25 50%, 0.25 75%, 1); /* steps() function values */ animation-timing-function: steps(4, jump-start); animation-timing-function: steps(10, jump-end); animation-timing-function: steps(20, jump-none); animation-timing-function: steps(5, jump-both); animation-timing-function: steps(6, start); animation-timing-function: steps(8, end); /* Multiple animations */ animation-timing-function: ease, step-start, cubic-bezier(0.1, 0.7, 1, 0.1); /* Global values */ animation-timing-function: inherit; animation-timing-function: initial; animation-timing-function: revert; animation-timing-function: revert-layer; animation-timing-function: unset;"
        - region "Values" [ref=e192]:
