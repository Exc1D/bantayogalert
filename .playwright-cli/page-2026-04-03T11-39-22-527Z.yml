          - paragraph [ref=e426]:
            - text: Information design is the practice of presenting information in a way that fosters an efficient and effective understanding of the information. The term has come to be used for a specific area of
            - link "graphic design" [ref=e427] [cursor=pointer]:
              - /url: /wiki/Graphic_design
            - text: related to displaying information effectively, rather than just attractively or for artistic expression. Information design is closely related to the field of
            - link "data visualization" [ref=e428] [cursor=pointer]:
              - /url: /wiki/Data_visualization
            - text: and is often taught as part of graphic design courses.
            - superscript [ref=e429]:
              - link "[1]" [ref=e430] [cursor=pointer]:
                - /url: "#cite_note-1"
            - text: The broad applications of information design along with its close connections to other fields of
            - link "design" [ref=e431] [cursor=pointer]:
              - /url: /wiki/Design
            - text: and communication practices have created some overlap in the definitions of
            - link "communication design" [ref=e432] [cursor=pointer]:
              - /url: /wiki/Communication_design
            - text: ","
            - link "data visualization" [ref=e433] [cursor=pointer]:
              - /url: /wiki/Data_visualization
            - text: ", and"
            - link "information architecture" [ref=e434] [cursor=pointer]:
              - /url: /wiki/Information_architecture
            - text: .
          - paragraph [ref=e435]:
            - text: According to
            - link "Per Mollerup" [ref=e436] [cursor=pointer]:
              - /url: /wiki/Per_Mollerup
            - text: ", information design is explanation design. It explains facts of the universe and leads to knowledge and informed action."
            - superscript [ref=e437]:
              - link "[2]" [ref=e438] [cursor=pointer]:
                - /url: "#cite_note-2"
          - generic [ref=e439]:
            - heading "History" [level=2] [ref=e440]
            - generic [ref=e441]:
              - text: "["
              - link "edit" [ref=e442] [cursor=pointer]:
                - /url: /w/index.php?title=Information_design&action=edit&section=1
              - text: "]"
          - paragraph [ref=e443]:
            - text: The term 'information design' emerged as a
            - link "multidisciplinary" [ref=e444] [cursor=pointer]:
              - /url: /wiki/Interdisciplinary
            - text: area of study in the 1970s. Use of the term is said to have started with graphic designers and it was solidified with the publication of the Information Design Journal in 1979. Later, the related International Institute for Information Design (IIID) was set up in 1987 and
            - link "Information Design Association" [ref=e445] [cursor=pointer]:
              - /url: /wiki/Information_Design_Association
            - text: (IDA) established in 1991.
            - superscript [ref=e446]:
              - link "[3]" [ref=e447] [cursor=pointer]:
                - /url: "#cite_note-3"
            - text: In 1982,
            - link "Edward Tufte" [ref=e448] [cursor=pointer]:
              - /url: /wiki/Edward_Tufte
            - text: produced a book on information design called The Visual Display of Quantitative Information. The term
            - link "information graphics" [ref=e449] [cursor=pointer]:
              - /url: /wiki/Information_graphics
            - text: tends to be used by those primarily concerned with diagramming and display of quantitative information, such as technical communicators and graphic designers.
          - paragraph [ref=e450]:
            - text: In
            - link "technical communication" [ref=e451] [cursor=pointer]:
              - /url: /wiki/Technical_communication
            - text: ", information design refers to creating an information structure for a set of information aimed at specified audiences. It can be practised on different scales."
          - list [ref=e452]:
            - listitem [ref=e453]: On a large scale, it implies choosing relevant content and dividing it into separate manuals by audience and purpose.
            - listitem [ref=e454]: On a medium scale, it means organizing the content in each manual and making sure that overviews, concepts, examples, references, and definitions are included and that topics follow an organizing principle.
            - listitem [ref=e455]: On a small or detailed scale, it includes logical development of topics, emphasis on what's important, clear writing, navigational clues, and even page design, choice of font, and use of white space.
          - paragraph [ref=e456]:
            - text: There are many similarities between information design and information architecture. The title of information designer is sometimes used by graphic designers who specialize in creating websites. The skillset of the information designer, as the title is applied more globally, is closer to that of the
            - link "information architect" [ref=e457] [cursor=pointer]:
              - /url: /wiki/Information_architecture
            - text: in the U.S. Similar skills for organization and structure are brought to bear in designing web sites and digital media, with additional constraints and functions that earn a designer the title information architect.
          - paragraph [ref=e458]:
            - text: In
            - link "computer science" [ref=e459] [cursor=pointer]:
              - /url: /wiki/Computer_science
            - text: and
            - link "information technology" [ref=e460] [cursor=pointer]:
              - /url: /wiki/Information_technology
            - text: ", 'information design' is sometimes a rough synonym for (but is not necessarily the same discipline as)"
            - link "information architecture" [ref=e461] [cursor=pointer]:
              - /url: /wiki/Information_architecture
            - text: ", the design of"
            - link "information systems" [ref=e462] [cursor=pointer]:
              - /url: /wiki/Information_system
            - text: ","
            - link "databases" [ref=e463] [cursor=pointer]:
              - /url: /wiki/Database
            - text: ", or"
            - link "data structures" [ref=e464] [cursor=pointer]:
              - /url: /wiki/Data_structure
            - text: . This sense includes
            - link "data modeling" [ref=e465] [cursor=pointer]:
              - /url: /wiki/Data_modeling
            - text: and
            - link "process analysis" [ref=e466] [cursor=pointer]:
              - /url: /wiki/Process_analysis
            - text: .
          - generic [ref=e467]:
            - heading "Early examples" [level=2] [ref=e468]
            - generic [ref=e469]:
              - text: "["
              - link "edit" [ref=e470] [cursor=pointer]:
                - /url: /w/index.php?title=Information_design&action=edit&section=2
              - text: "]"
          - figure "Charles Joseph Minard's 1861 diagram of Napoleon's March - an early example of an information graphic." [ref=e471]:
            - link [ref=e472] [cursor=pointer]:
              - /url: /wiki/File:Minard.png
              - img [ref=e473]
            - generic [ref=e474]:
              - link "Charles Joseph Minard" [ref=e475] [cursor=pointer]:
                - /url: /wiki/Charles_Joseph_Minard
              - text: "'s 1861 diagram of"
              - link "Napoleon's March" [ref=e476] [cursor=pointer]:
                - /url: /wiki/French_invasion_of_Russia
              - text: "- an early example of an information graphic."
          - paragraph [ref=e477]: "Information design is associated with the age of technology but it does have historical roots. Early instances of modern information design include these effective examples:"
          - list [ref=e478]:
            - listitem [ref=e479]:
              - link "William Playfair" [ref=e480] [cursor=pointer]:
                - /url: /wiki/William_Playfair
              - text: "'s"
              - link "line" [ref=e481] [cursor=pointer]:
                - /url: /wiki/Line_chart
              - text: ","
              - link "bar" [ref=e482] [cursor=pointer]:
                - /url: /wiki/Bar_chart
              - text: ","
              - link "pie" [ref=e483] [cursor=pointer]:
                - /url: /wiki/Pie_chart
              - text: ", and"
              - link "area charts" [ref=e484] [cursor=pointer]:
                - /url: /wiki/Area_chart
              - text: illustrating England's trade (1786 and 1801)
              - superscript [ref=e485]:
                - link "[4]" [ref=e486] [cursor=pointer]:
                  - /url: "#cite_note-4"
              - superscript [ref=e487]:
                - link "[5]" [ref=e488] [cursor=pointer]:
                  - /url: "#cite_note-Tufte-5"
            - listitem [ref=e489]:
              - link "John Snow" [ref=e490] [cursor=pointer]:
                - /url: /wiki/John_Snow_(physician)
              - text: "'s spot maps, which pinpointed the source of a deadly cholera outbreak in 1850s London"
              - superscript [ref=e491]:
                - link "[6]" [ref=e492] [cursor=pointer]:
                  - /url: "#cite_note-6"
            - listitem [ref=e493]:
              - link "Charles Joseph Minard" [ref=e494] [cursor=pointer]:
                - /url: /wiki/Charles_Joseph_Minard
              - text: "'s 1861 diagram depicting Napoleon's Russian campaign of 1812"
              - superscript [ref=e495]:
                - link "[7]" [ref=e496] [cursor=pointer]:
                  - /url: "#cite_note-7"
            - listitem [ref=e497]:
              - link "W.E.B. Du Bois" [ref=e498] [cursor=pointer]:
                - /url: /wiki/W.E.B._Du_Bois
              - text: "'s data visualization on the lives of Black Americans for the 1900 World's Fair"
              - superscript [ref=e499]:
                - link "[8]" [ref=e500] [cursor=pointer]:
                  - /url: "#cite_note-8"
            - listitem [ref=e501]:
              - link "Otto Neurath" [ref=e502] [cursor=pointer]:
                - /url: /wiki/Otto_Neurath
              - text: "'s"
              - link "International Picture Language" [ref=e503] [cursor=pointer]:
                - /url: /wiki/Isotype_(pictograms)
              - text: of the 1930s
              - superscript [ref=e504]:
                - link "[9]" [ref=e505] [cursor=pointer]:
                  - /url: "#cite_note-9"
            - listitem [ref=e506]:
              - link "Florence Nightingale" [ref=e507] [cursor=pointer]:
                - /url: /wiki/Florence_Nightingale
              - text: "'s information graphic depicting army mortality rates"
              - superscript [ref=e508]:
                - link "[10]" [ref=e509] [cursor=pointer]:
                  - /url: "#cite_note-10"
          - paragraph [ref=e510]:
            - text: "The Minard diagram shows the losses suffered by Napoleon's army in the 1812–1813 period. Six variables are plotted: the size of the army, its location on a two-dimensional surface (x and y), time, direction of movement, and temperature. This multivariate display on a two-dimensional surface tells a story that can be grasped immediately while identifying the source data to build credibility."
            - link "Edward Tufte" [ref=e511] [cursor=pointer]:
              - /url: /wiki/Edward_Tufte
            - text: "wrote in 1983 that: \"It may well be the best statistical graphic ever drawn.\""
            - superscript [ref=e512]:
              - link "[5]" [ref=e513] [cursor=pointer]:
                - /url: "#cite_note-Tufte-5"
          - generic [ref=e514]:
            - heading "Applications" [level=2] [ref=e515]
