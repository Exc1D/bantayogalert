          - paragraph [ref=e530]:
            - text: Information design can be used for broad audiences (such as signs in airports) or specific audiences (such as personalized telephone bills).
            - superscript [ref=e531]:
              - link "[11]" [ref=e532] [cursor=pointer]:
                - /url: "#cite_note-11"
            - text: The resulting work often seeks to improve a user's trust of a product (such as medicine packaging inserts, operational instructions for industrial machinery and information for emergencies). The example of signs also highlights a niche category known as
            - link "wayfinding" [ref=e533] [cursor=pointer]:
              - /url: /wiki/Wayfinding
            - text: .
          - paragraph [ref=e534]:
            - text: Governments and regulatory authorities have legislated about a number of information design issues, such as the minimum size of type in financial small print, the labelling of ingredients in processed food, and the testing of medicine labelling. Examples of this are the
            - link "Truth in Lending Act" [ref=e535] [cursor=pointer]:
              - /url: /wiki/Truth_in_Lending_Act
            - text: in the USA, which introduced the
            - link "Schumer box" [ref=e536] [cursor=pointer]:
              - /url: /wiki/Schumer_box
            - text: (a concise summary of charges for people applying for a credit card), and the Guideline on the Readability of the Labelling and Package Leaflet of Medicinal Products for Human Use (European Commission, Revision 1, 12 January 2009).
          - paragraph [ref=e537]:
            - text: Professor
            - link "Edward Tufte" [ref=e538] [cursor=pointer]:
              - /url: /wiki/Edward_Tufte
            - text: explained that users of information displays are executing particular analytical tasks such as making comparisons or determining causality. The design principle of the information graphic should support the analytical task, showing the comparison or causality.
            - superscript [ref=e539]:
              - link "[12]" [ref=e540] [cursor=pointer]:
                - /url: "#cite_note-12"
          - generic [ref=e541]:
            - heading "Simplicity" [level=2] [ref=e542]
            - generic [ref=e543]:
              - text: "["
              - link "edit" [ref=e544] [cursor=pointer]:
                - /url: /w/index.php?title=Information_design&action=edit&section=4
              - text: "]"
          - paragraph [ref=e545]: "Simplicity is a major concern in information design. The aim is clarity and understanding. Simplification of messages may imply quantitative reduction but is not restricted to that. Sometimes more information means more clarity. Also, simplicity is a highly subjective matter and should always be evaluated with the information user in mind. Simplicity can be easy when following five simple steps when it comes to information design:"
          - list [ref=e546]:
            - listitem [ref=e547]: Tell the truth,
            - listitem [ref=e548]: Get to the point,
            - listitem [ref=e549]: Pick the right tool for the job,
            - listitem [ref=e550]: Highlight what is important,
            - listitem [ref=e551]: Of course, keep it simple.
          - paragraph [ref=e552]:
            - text: These steps will help an information designer narrow down results, as well as keeping their audience engaged.
            - superscript [ref=e553]:
              - link "[13]" [ref=e554] [cursor=pointer]:
                - /url: "#cite_note-13"
