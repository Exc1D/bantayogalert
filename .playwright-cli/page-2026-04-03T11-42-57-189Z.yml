            - code [ref=e763]: "const divElem = document.querySelector(\"div\"); const htmlElem = document.querySelector(\":root\"); htmlElem.addEventListener(\"click\", showHide); document.addEventListener(\"keydown\", showHide); function showHide() { if (divElem.classList[0] === \"fade-in\") { divElem.classList.remove(\"fade-in\"); divElem.classList.add(\"fade-out\"); } else { divElem.classList.remove(\"fade-out\"); divElem.classList.add(\"fade-in\"); } }"
