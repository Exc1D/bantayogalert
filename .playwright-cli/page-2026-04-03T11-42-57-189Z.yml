        - region "Animating display and content-visibility" [ref=e632]:
          - heading "Animating display and content-visibility" [level=3] [ref=e633]:
            - link "Animating display and content-visibility" [ref=e634] [cursor=pointer]:
              - /url: "#animating_display_and_content-visibility"
          - paragraph [ref=e635]:
            - text: This example demonstrates how
            - link "display" [ref=e636] [cursor=pointer]:
              - /url: /en-US/docs/Web/CSS/Reference/Properties/display
              - code [ref=e637]: display
            - text: and
            - link "content-visibility" [ref=e638] [cursor=pointer]:
              - /url: /en-US/docs/Web/CSS/Reference/Properties/content-visibility
              - code [ref=e639]: content-visibility
            - text: can be animated. This behavior is useful for creating entry/exit animations where you want to for example remove a container from the DOM with
            - code [ref=e640]: "display: none"
            - text: ", but have it fade out smoothly with"
            - link "opacity" [ref=e641] [cursor=pointer]:
              - /url: /en-US/docs/Web/CSS/Reference/Properties/opacity
              - code [ref=e642]: opacity
            - text: rather than disappearing immediately.
          - paragraph [ref=e643]:
            - text: Supporting browsers animate
            - code [ref=e644]: display
            - text: and
            - code [ref=e645]: content-visibility
            - text: with a variation on the
            - link "discrete animation type" [ref=e646] [cursor=pointer]:
              - /url: /en-US/docs/Web/CSS/Guides/Animations/Animatable_properties#discrete
            - text: . This generally means that properties will flip between two values 50% of the way through animating between the two.
          - paragraph [ref=e647]:
            - text: There is an exception, however, which is when animating to/from
            - code [ref=e648]: "display: none"
            - text: or
            - code [ref=e649]: "content-visibility: hidden"
            - text: to a visible value. In this case, the browser will flip between the two values so that the animated content is shown for the entire animation duration.
          - paragraph [ref=e650]: "So for example:"
          - list [ref=e651]:
            - listitem [ref=e652]:
              - text: When animating
              - code [ref=e653]: display
              - text: from
              - code [ref=e654]: none
              - text: to
              - code [ref=e655]: block
              - text: (or another visible
              - code [ref=e656]: display
              - text: value), the value will flip to
              - code [ref=e657]: block
              - text: at
              - code [ref=e658]: 0%
              - text: of the animation duration so it is visible throughout.
            - listitem [ref=e659]:
              - text: When animating
              - code [ref=e660]: display
              - text: from
              - code [ref=e661]: block
              - text: (or another visible
              - code [ref=e662]: display
              - text: value) to
              - code [ref=e663]: none
              - text: ", the value will flip to"
              - code [ref=e664]: none
              - text: at
              - code [ref=e665]: 100%
              - text: of the animation duration so it is visible throughout.
