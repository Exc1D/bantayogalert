        - generic [ref=e86]:
          - paragraph [ref=e87]:
            - strong [ref=e88]: CSS animations
            - text: "make it possible to animate transitions from one CSS style configuration to another. Animations consist of two components: a style describing the CSS animation and a set of keyframes that indicate the start and end states of the animation's style, as well as possible intermediate waypoints."
          - paragraph [ref=e89]: "There are three key advantages to CSS animations over traditional script-driven animation techniques:"
          - list [ref=e90]:
            - listitem [ref=e91]: You can create basic animations with a few lines of CSS; no JavaScript required.
            - listitem [ref=e92]: The animations run well, even under moderate system load. Simple animations can often perform poorly in JavaScript. The rendering engine can use frame-skipping and other techniques to keep the performance as smooth as possible.
            - listitem [ref=e93]: Letting the browser control the animation sequence lets the browser optimize performance and efficiency by, for example, reducing the update frequency of animations running in tabs that aren't currently visible.
