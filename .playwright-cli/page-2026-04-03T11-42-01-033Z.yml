        - region "Responsive images/media" [ref=e384]:
          - heading "Responsive images/media" [level=2] [ref=e385]:
            - link "Responsive images/media" [ref=e386] [cursor=pointer]:
              - /url: "#responsive_imagesmedia"
          - paragraph [ref=e387]: "To ensure media is never larger than its responsive container, the following approach can be used:"
          - generic [ref=e389]:
            - generic [ref=e390]:
              - generic [ref=e391]: css
              - button "Copy" [ref=e394] [cursor=pointer]:
                - generic [ref=e395]:
                  - generic: Copy
            - code [ref=e397]: "img, picture, video { max-width: 100%; }"
          - paragraph [ref=e398]: This scales media elements to ensure they never overflow their containers.
          - paragraph [ref=e400]:
            - strong [ref=e401]: "Note:"
            - text: Using a single large image and scaling it down to fit small devices wastes bandwidth by downloading images larger than required. It can also look bad — a landscape image for example might look good on a widescreen monitor, but it might be hard to see on a mobile device, which would suit a portrait image better. Such problems can be solved using the
            - link "<picture>" [ref=e402] [cursor=pointer]:
              - /url: /en-US/docs/Web/HTML/Reference/Elements/picture
              - code [ref=e403]: <picture>
            - text: element and the
            - link "<img>" [ref=e404] [cursor=pointer]:
              - /url: /en-US/docs/Web/HTML/Reference/Elements/img
              - code [ref=e405]: <img>
            - code [ref=e406]: srcset
            - text: and
            - code [ref=e407]: sizes
            - text: attributes. These are advanced features that are beyond the scope of this course, but you can find a detailed guide at
            - link "Responsive images" [ref=e408] [cursor=pointer]:
              - /url: /en-US/docs/Web/HTML/Guides/Responsive_images
            - text: .
          - paragraph [ref=e409]: "Other useful tips:"
          - list [ref=e410]:
            - listitem [ref=e411]: Always make sure to use an appropriate image format for your website images (such as PNG or JPG), and make sure to optimize the file size using a graphics editor before you put them on your website.
            - listitem [ref=e412]:
              - text: You can make use of CSS features like
              - link "gradients" [ref=e413] [cursor=pointer]:
                - /url: /en-US/docs/Web/CSS/Guides/Images/Using_gradients
              - text: and
              - link "shadows" [ref=e414] [cursor=pointer]:
                - /url: /en-US/docs/Web/CSS/Reference/Properties/box-shadow
              - text: to implement visual effects without using images.
            - listitem [ref=e415]:
              - text: You can use media queries inside the media attribute on
              - link "<source>" [ref=e416] [cursor=pointer]:
                - /url: /en-US/docs/Web/HTML/Reference/Elements/source
                - code [ref=e417]: <source>
              - text: elements nested inside
              - link "<video>" [ref=e418] [cursor=pointer]:
                - /url: /en-US/docs/Web/HTML/Reference/Elements/video
                - code [ref=e419]: <video>
              - text: /
              - link "<audio>" [ref=e420] [cursor=pointer]:
                - /url: /en-US/docs/Web/HTML/Reference/Elements/audio
                - code [ref=e421]: <audio>
              - text: elements to serve video/audio files as appropriate for different devices (responsive video/audio).
        - region "Responsive typography" [ref=e422]:
          - heading "Responsive typography" [level=2] [ref=e423]:
            - link "Responsive typography" [ref=e424] [cursor=pointer]:
              - /url: "#responsive_typography"
          - paragraph [ref=e425]: Responsive typography describes changing font sizes within media queries or using viewport units to reflect lesser or greater amounts of screen real estate.
        - region "Using media queries for responsive typography" [ref=e426]:
          - heading "Using media queries for responsive typography" [level=3] [ref=e427]:
            - link "Using media queries for responsive typography" [ref=e428] [cursor=pointer]:
              - /url: "#using_media_queries_for_responsive_typography"
          - paragraph [ref=e429]:
            - text: In this example, we want to set our level 1 heading to be
            - code [ref=e430]: 4rem
            - text: ", meaning it will be four times our base font size. That's a really large heading! We only want this jumbo heading on larger screen sizes, therefore we first give the heading a smaller size of"
            - code [ref=e431]: 2rem
            - text: ", then use media queries to overwrite it with the larger size if we know that the user has a screen width of at least"
            - code [ref=e432]: 1200px
            - text: .
          - generic [ref=e434]:
            - generic [ref=e435]:
              - generic [ref=e436]: css
              - button "Copy" [ref=e439] [cursor=pointer]:
                - generic [ref=e440]:
                  - generic: Copy
            - code [ref=e442]:
              - text: "html { font-size: 1em; } h1 { font-size: 2rem; }"
              - generic [ref=e443]: "@media (width >= 1200px)"
              - text: "{ h1 { font-size: 4rem; } }"
          - paragraph [ref=e444]: "The next example is a modified version of our earlier responsive grid example, which includes a responsive heading using the method outlined. On mobile the heading is smaller, but on desktop, we see the larger heading size:"
          - generic [ref=e446]:
            - generic [ref=e447]:
              - generic [ref=e448]: html
              - button "Copy" [ref=e451] [cursor=pointer]:
                - generic [ref=e452]:
                  - generic: Copy
