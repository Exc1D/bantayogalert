          - paragraph [ref=e511]:
            - text: As with previous examples, try changing the browser window width, and note how not only the layout changes at the
            - code [ref=e512]: 600px
            - text: width threshold, but also the heading size.
          - paragraph [ref=e513]: As this approach to typography shows, you do not need to restrict media queries to only changing the layout of the page. They can be used to tweak any element to make it more usable or attractive at alternate screen sizes.
        - region "Using viewport units for responsive typography" [ref=e514]:
          - heading "Using viewport units for responsive typography" [level=3] [ref=e515]:
            - link "Using viewport units for responsive typography" [ref=e516] [cursor=pointer]:
              - /url: "#using_viewport_units_for_responsive_typography"
          - paragraph [ref=e517]:
            - text: Viewport units
            - code [ref=e518]: vw
            - text: can also be used to enable responsive typography, without the need for setting breakpoints with media queries.
            - code [ref=e519]: 1vw
            - text: is equal to one percent of the viewport width, meaning that if you set your font size using
            - code [ref=e520]: vw
            - text: ", it will always relate to the size of the viewport."
          - generic [ref=e522]:
            - generic [ref=e523]:
              - generic [ref=e524]: css
              - button "Copy" [ref=e527] [cursor=pointer]:
                - generic [ref=e528]:
                  - generic: Copy
            - code [ref=e530]: "h1 { font-size: 6vw; }"
          - paragraph [ref=e531]:
            - text: The problem with doing the above is that the user loses the ability to zoom any text set using the
            - code [ref=e532]: vw
            - text: unit, as that text is always related to the size of the viewport.
            - strong [ref=e533]: Therefore you should never set text using viewport units alone
            - text: .
          - paragraph [ref=e534]:
            - text: There is a solution, and it involves using
            - link "calc()" [ref=e535] [cursor=pointer]:
              - /url: /en-US/docs/Web/CSS/Reference/Values/calc
              - code [ref=e536]: calc()
            - text: . If you add the
            - code [ref=e537]: vw
            - text: unit to a value set using a fixed size such as
            - code [ref=e538]: em
            - text: s or
            - code [ref=e539]: rem
            - text: s then the text will still be zoomable. Essentially, the
            - code [ref=e540]: vw
            - text: "unit adds on top of that zoomed value:"
          - generic [ref=e542]:
            - generic [ref=e543]:
              - generic [ref=e544]: css
              - button "Copy" [ref=e547] [cursor=pointer]:
                - generic [ref=e548]:
                  - generic: Copy
            - code [ref=e550]: "h1 { font-size: calc(1.5rem + 4vw); }"
          - paragraph [ref=e551]: This means that we only need to specify the font size for the heading once, rather than set it up for mobile and redefine it in the media queries. The font then gradually increases as you increase the size of the viewport.
