        - region "The viewport meta tag" [ref=e616]:
          - heading "The viewport meta tag" [level=2] [ref=e617]:
            - link "The viewport meta tag" [ref=e618] [cursor=pointer]:
              - /url: "#the_viewport_meta_tag"
          - paragraph [ref=e619]:
            - text: If you look at the HTML source of a responsive page, you will usually see the following
            - link "<meta>" [ref=e620] [cursor=pointer]:
              - /url: /en-US/docs/Web/HTML/Reference/Elements/meta
              - code [ref=e621]: <meta>
            - text: tag in the
            - code [ref=e622]: <head>
            - text: of the document.
          - generic [ref=e624]:
            - generic [ref=e625]:
              - generic [ref=e626]: html
              - button "Copy" [ref=e629] [cursor=pointer]:
                - generic [ref=e630]:
                  - generic: Copy
            - code [ref=e632]:
              - generic [ref=e633]:
                - generic [ref=e634]: <meta
                - text: name
                - generic [ref=e635]: ="viewport"
                - text: content
                - generic [ref=e636]: ="width=device-width,initial-scale=1"
                - text: />
          - paragraph [ref=e637]:
            - text: This
            - link "viewport" [ref=e638] [cursor=pointer]:
              - /url: /en-US/docs/Web/HTML/Reference/Elements/meta/name/viewport
              - code [ref=e639]: viewport
            - text: meta tag tells mobile browsers that they should set the width of the viewport to the device's width, and scale the document to 100% of its intended size, which shows the document at the mobile-optimized size that you intended.
          - paragraph [ref=e640]: Why is this needed? Because mobile browsers tend to lie about their viewport width.
          - paragraph [ref=e641]: This meta tag exists because when smartphones first arrived, most sites were not mobile optimized. The mobile browser would, therefore, set the viewport width to 980 pixels, render the page at that width, and show the result as a zoomed-out version of the desktop layout. Users could zoom in and pan around the website to view the bits they were interested in, but it looked bad.
          - paragraph [ref=e642]:
            - text: By setting
            - code [ref=e643]: width=device-width
            - text: you are overriding a mobile device's default, like the iPhone's default
            - code [ref=e644]: width=980px
            - text: ", with the actual width of the device. Without it, your responsive design with breakpoints and media queries may not work as intended on mobile browsers. If you've got a narrow screen layout that kicks in at 480px viewport width or less, but the device is saying it is 980px wide, that user will not see your narrow screen layout."
          - paragraph [ref=e645]:
            - strong [ref=e646]:
              - text: So you should
              - emphasis [ref=e647]: always
              - text: include the viewport meta tag in the head of your documents.
          - paragraph [ref=e648]:
            - text: There are a number of other options you can put inside the
            - code [ref=e649]: content
            - text: attribute of the viewport meta tag — see the
            - link "<meta name=\"viewport\">" [ref=e650] [cursor=pointer]:
              - /url: /en-US/docs/Web/HTML/Reference/Elements/meta/name/viewport
              - code [ref=e651]: <meta name="viewport">
            - text: reference for more details.
        - region "Summary" [ref=e652]:
          - heading "Summary" [level=2] [ref=e653]:
            - link "Summary" [ref=e654] [cursor=pointer]:
              - /url: "#summary"
          - paragraph [ref=e655]: Responsive design refers to a site or application design that responds to the environment in which it is viewed. It encompasses a number of CSS and HTML features and techniques and is essentially how we build websites by default. Consider the sites that you visit on your phone — it is probably fairly unusual to come across a site that is the desktop version scaled down, or where you need to scroll sideways to find things. This is because the web has moved to this approach of designing responsively.
          - paragraph [ref=e656]: It has also become much easier to achieve responsive designs with the help of the layout methods covered in this article. If you are new to web development today you have many more tools at your disposal than in the early days of responsive design. It is therefore worth checking the age of any materials you are using. While the historical articles are still useful, modern use of CSS and HTML makes it far easier to create elegant and useful designs, no matter what device your visitor views the site with.
          - paragraph [ref=e657]: Next, we will study media queries in more detail and show how to use them to solve some common problems.
