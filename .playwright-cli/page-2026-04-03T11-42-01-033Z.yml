            - link "Responsive layout technologies" [ref=e210] [cursor=pointer]:
              - /url: "#responsive_layout_technologies"
          - paragraph [ref=e211]: Responsive sites are built on flexible grids, meaning you don't need to target every possible device size with pixel perfect layouts.
          - paragraph [ref=e212]:
            - text: By using a flexible grid, you can change a feature or add in a breakpoint and change the design at the point where the content starts to look bad. For example, to ensure line lengths don't become unreadably long as the screen size increases you can use
            - link "columns" [ref=e213] [cursor=pointer]:
