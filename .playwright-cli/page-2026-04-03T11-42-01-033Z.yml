      - generic [ref=e137]:
        - 'region "Precursor to responsive design: mobile web design" [ref=e138]':
          - 'heading "Precursor to responsive design: mobile web design" [level=2] [ref=e139]':
            - 'link "Precursor to responsive design: mobile web design" [ref=e140] [cursor=pointer]':
              - /url: "#precursor_to_responsive_design_mobile_web_design"
          - paragraph [ref=e141]: Before responsive web design became the standard approach for making websites work across different device types, web developers used to talk about mobile web design, mobile web development, or sometimes, mobile-friendly design. These are basically the same as responsive web design — the goals are to make sure that websites work well across devices with different physical attributes (screen size, resolution) in terms of layout, content (text and media), and performance.
          - paragraph [ref=e142]: "The difference is mainly to do with the devices involved, and the technologies available to create solutions:"
          - list [ref=e143]:
            - listitem [ref=e144]: We used to talk about desktop or mobile, but now there are many different types of device available such as desktop, laptop, mobile, tablets, watches, etc. Instead of catering for a few different screen sizes, we now need to design sites defensively to cater for common screen sizes and resolutions, plus unknowns.
            - listitem [ref=e145]:
              - text: Mobile devices used to be low-powered in terms of CPU/GPU and available bandwidth. Some didn't support CSS or even HTML, and as a result, it was common to perform server-side browser sniffing to determine device/browser type before then serving a site that the device would be able to cope with. Mobile devices often had really simple, basic experiences served to them because it was all they could handle. These days, mobile devices are able to handle the same technologies as desktop computers, so such techniques are less common.
              - list [ref=e146]:
                - listitem [ref=e147]: You should still use the techniques discussed in this article to serve mobile users a suitable experience, as there are still constraints such as battery life and bandwidth to worry about.
                - listitem [ref=e148]: User experience is still a concern. A mobile user of a travel site might just want to check flight times and delay information, for example, and not be presented with a 3D animated globe showing flight paths and your company history.
            - listitem [ref=e149]:
              - text: Modern technologies are much better for creating responsive experiences. For example,
              - link "responsive images/media technologies" [ref=e150] [cursor=pointer]:
                - /url: "#responsive_imagesmedia"
              - text: now allow appropriate media to be served to different devices without having to rely on techniques like server-side sniffing.
        - region "Introducing responsive web design" [ref=e151]:
          - heading "Introducing responsive web design" [level=2] [ref=e152]:
            - link "Introducing responsive web design" [ref=e153] [cursor=pointer]:
              - /url: "#introducing_responsive_web_design"
          - paragraph [ref=e154]:
            - text: HTML is fundamentally responsive, or
            - emphasis [ref=e155]: fluid
            - text: . If you create a web page containing only HTML, with no CSS, and resize the window, the browser will automatically reflow the text to fit the viewport.
          - paragraph [ref=e156]: While the default responsive behavior may sound like no solution is needed, long lines of text displayed full screen on a wide monitor can be difficult to read. This problem can be solved with CSS, for example by creating narrow columns to limit the line length. However, this can create new problems for users that narrow their browser window or view the site on a mobile device — the columns will look squashed and become harder to read.
          - paragraph [ref=e157]:
            - img "A layout with two columns squashed into a mobile size viewport." [ref=e158]
          - paragraph [ref=e159]: Creating a non-resizable web page by setting a fixed width doesn't work either; that leads to scroll bars on narrow devices and too much empty space on wide screens.
          - paragraph [ref=e160]: Responsive web design, or RWD, is a design approach that addresses the full range of available devices and device sizes, enabling automatic adaption to the screen, whether the content is viewed on a tablet, phone, television, or watch.
          - paragraph [ref=e161]:
            - text: Responsive web design isn't a separate technology — it is an approach. It is a term used to describe a set of best practices used to create a layout that can
            - emphasis [ref=e162]: respond
            - text: to any device being used to view the content.
          - paragraph [ref=e163]:
            - text: The term
            - emphasis [ref=e164]: responsive design
            - text: ","
            - link "coined by Ethan Marcotte in 2010 (external)" [ref=e165] [cursor=pointer]:
              - /url: https://alistapart.com/article/responsive-web-design/
            - text: ", described using fluid grids, fluid images, and media queries to create responsive content."
          - paragraph [ref=e166]:
            - text: At the time, the recommendation was to use CSS
            - code [ref=e167]: float
            - text: for layout and media queries to query the browser width, creating layouts for different breakpoints. Fluid images are set to not exceed the width of their container; they have their
            - code [ref=e168]: max-width
            - text: property set to
            - code [ref=e169]: 100%
            - text: . Fluid images scale down when their containing column narrows but do not grow larger than their intrinsic size when the column grows. This enables an image to scale down to fit its content, rather than overflow it, but not grow larger and become pixelated if the container becomes wider than the image.
          - paragraph [ref=e170]: Modern CSS layout methods are inherently responsive, and, since the publication of Marcotte's article, we have a multitude of features built into the web platform to make designing responsive sites easier.
          - paragraph [ref=e171]: The rest of this article will explain the various web platform features you might want to use when creating a responsive site.
        - region "Media Queries" [ref=e172]:
          - heading "Media Queries" [level=2] [ref=e173]:
            - link "Media Queries" [ref=e174] [cursor=pointer]:
              - /url: "#media_queries"
          - paragraph [ref=e175]:
            - link "Media queries" [ref=e176] [cursor=pointer]:
              - /url: /en-US/docs/Web/CSS/Guides/Media_queries/Using
            - text: allow us to run a series of tests (for example, whether the user's screen is greater than a certain width or resolution) and apply CSS selectively to style the page appropriately for the user's needs.
          - paragraph [ref=e177]:
            - text: For example, the following media query tests to see if the current web page is being displayed as screen media (therefore not a printed document) and the viewport is at least
            - code [ref=e178]: 80rem
            - text: wide. The
            - code [ref=e179]: .container
            - text: rule will only be applied if these two things are true.
          - generic [ref=e181]:
            - generic [ref=e182]:
