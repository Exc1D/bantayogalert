              - text: "{ .container { margin: 1em 2em; } }"
          - paragraph [ref=e191]:
            - text: You can add multiple media queries within a stylesheet, tweaking your whole layout or parts of it to best suit the various screen sizes. The points at which a media query is introduced, and the layout changes, are known as
            - emphasis [ref=e192]: breakpoints
            - text: .
          - paragraph [ref=e193]:
            - text: A common approach when using media queries is to create a simple single-column layout for narrow-screen devices (for example, mobile phones), then check for wider screens and implement a multiple-column layout when you know that you have enough screen width to handle it. Designing for mobile first is known as
            - strong [ref=e194]: mobile first
            - text: design.
          - paragraph [ref=e195]:
            - text: If using breakpoints, best practices encourage defining media query breakpoints with
            - link "relative units" [ref=e196] [cursor=pointer]:
              - /url: /en-US/docs/Learn_web_development/Core/Styling_basics/Values_and_units#relative_length_units
            - text: rather than absolute sizes of an individual device.
          - paragraph [ref=e197]:
            - text: There are different approaches to the styles defined within a media query block; ranging from using media queries to
            - link "<link>" [ref=e198] [cursor=pointer]:
              - /url: /en-US/docs/Web/HTML/Reference/Elements/link
              - code [ref=e199]: <link>
            - text: style sheets based on browser size ranges to only including custom properties variables to store values associated with each breakpoint.
          - paragraph [ref=e200]: Media queries can help with RWD, but are not a requirement. Flexible grids, relative units, and minimum and maximum unit values can be used without media queries.
          - paragraph [ref=e202]:
