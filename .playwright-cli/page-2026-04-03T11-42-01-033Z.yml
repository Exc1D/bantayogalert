              - code [ref=e214]: columns
            - text: ; if a box becomes squashed with two words on each line as it narrows you can set a breakpoint.
          - paragraph [ref=e215]:
            - text: Several layout methods — including
            - link "Flexbox" [ref=e216] [cursor=pointer]:
              - /url: /en-US/docs/Learn_web_development/Core/CSS_layout/Flexbox
            - text: ", and"
            - link "CSS Grid" [ref=e217] [cursor=pointer]:
