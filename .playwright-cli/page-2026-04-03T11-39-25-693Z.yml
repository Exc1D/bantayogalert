                - /url: "#cite_note-44"
          - paragraph [ref=e460]:
            - link "User interface plasticity" [ref=e461] [cursor=pointer]:
              - /url: /wiki/User_interface_plasticity
            - text: is the capacity of a
            - link "user interface" [ref=e462] [cursor=pointer]:
              - /url: /wiki/User_interface
            - text: to withstand variations of both the system's physical characteristics and the environment while preserving
            - link "usability" [ref=e463] [cursor=pointer]:
