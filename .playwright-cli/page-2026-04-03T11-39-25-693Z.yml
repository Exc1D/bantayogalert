          - paragraph [ref=e295]:
            - text: Responsive web design (RWD) or responsive design is an approach to
            - link "web design" [ref=e296] [cursor=pointer]:
              - /url: /wiki/Web_design
            - text: that aims to make web pages render well on a variety of devices and window or screen sizes from minimum to maximum display size to ensure usability and satisfaction.
            - superscript [ref=e297]:
              - link "[1]" [ref=e298] [cursor=pointer]:
                - /url: "#cite_note-fluid_grid-1"
            - superscript [ref=e299]:
              - link "[2]" [ref=e300] [cursor=pointer]:
                - /url: "#cite_note-Schade_2014-2"
          - paragraph [ref=e301]:
            - text: A responsive design adapts the web-page layout to the viewing environment
            - superscript [ref=e302]:
              - link "[1]" [ref=e303] [cursor=pointer]:
                - /url: "#cite_note-fluid_grid-1"
            - text: by using techniques such as fluid proportion-based grids,
            - superscript [ref=e304]:
              - link "[3]" [ref=e305] [cursor=pointer]:
                - /url: "#cite_note-3"
            - superscript [ref=e306]:
              - link "[4]" [ref=e307] [cursor=pointer]:
                - /url: "#cite_note-EM_FG-4"
            - text: flexible images,
            - superscript [ref=e308]:
              - link "[5]" [ref=e309] [cursor=pointer]:
                - /url: "#cite_note-EM_FI-5"
            - superscript [ref=e310]:
              - link "[6]" [ref=e311] [cursor=pointer]:
                - /url: "#cite_note-6"
            - text: and
            - link "CSS3" [ref=e312] [cursor=pointer]:
              - /url: /wiki/Cascading_Style_Sheets#CSS_3
            - link "media queries" [ref=e313] [cursor=pointer]:
              - /url: /wiki/Media_queries
            - text: ","
            - superscript [ref=e314]:
              - link "[7]" [ref=e315] [cursor=pointer]:
                - /url: "#cite_note-ZMGflexEx-7"
            - superscript [ref=e316]:
              - link "[8]" [ref=e317] [cursor=pointer]:
                - /url: "#cite_note-ZMGmediaQ-8"
            - superscript [ref=e318]:
              - link "[9]" [ref=e319] [cursor=pointer]:
                - /url: "#cite_note-9"
            - text: an extension of the
            - code [ref=e320]: "@media"
            - text: rule,
            - superscript [ref=e321]:
              - link "[10]" [ref=e322] [cursor=pointer]:
                - /url: "#cite_note-10"
            - text: "in the following ways:"
          - list [ref=e323]:
            - listitem [ref=e324]:
              - text: The fluid
              - link "grid" [ref=e325] [cursor=pointer]:
                - /url: /wiki/Grid_(page_layout)#Grid_use_in_web_design
              - text: concept calls for page element sizing to be in relative units like percentages, rather than absolute units like
              - link "pixels" [ref=e326] [cursor=pointer]:
                - /url: /wiki/Pixel
              - text: or
              - link "points" [ref=e327] [cursor=pointer]:
                - /url: /wiki/Point_(typography)
              - text: .
              - superscript [ref=e328]:
                - link "[4]" [ref=e329] [cursor=pointer]:
                  - /url: "#cite_note-EM_FG-4"
            - listitem [ref=e330]:
              - text: Flexible images are also sized in relative units, so as to prevent them from displaying outside their containing
              - link "element" [ref=e331] [cursor=pointer]:
                - /url: /wiki/HTML_element
              - text: .
              - superscript [ref=e332]:
                - link "[5]" [ref=e333] [cursor=pointer]:
                  - /url: "#cite_note-EM_FI-5"
            - listitem [ref=e334]: Media queries allow the page to use different CSS style rules based on characteristics of the device the site is being displayed on, e.g. width of the rendering surface (browser window width or physical display size).
            - listitem [ref=e335]: Responsive layouts automatically adjust and adapt to any device screen size, whether it is a desktop, a laptop, a tablet, or a mobile phone.
          - paragraph [ref=e336]:
            - text: Responsive web design became more important as users of mobile devices came to account for the majority of website visitors.
            - superscript [ref=e337]:
              - link "[11]" [ref=e338] [cursor=pointer]:
                - /url: "#cite_note-11"
            - superscript [ref=e339]:
              - link "[12]" [ref=e340] [cursor=pointer]:
                - /url: "#cite_note-12"
            - text: In 2015, for instance, Google announced
            - link "Mobilegeddon" [ref=e341] [cursor=pointer]:
              - /url: /wiki/Mobilegeddon
            - text: and started to boost the page ranking of mobile-friendly sites when searching from a mobile device.
            - superscript [ref=e342]:
              - link "[13]" [ref=e343] [cursor=pointer]:
                - /url: "#cite_note-13"
            - text: As mobile usage grew, optimization practices such as improved load speed, touch-friendly navigation, and mobile-focused SEO became essential for ensuring usability and maintaining search visibility.
            - superscript [ref=e344]:
              - link "[14]" [ref=e345] [cursor=pointer]:
                - /url: "#cite_note-14"
          - paragraph [ref=e346]:
            - text: Responsive web design is an example of
            - link "user interface plasticity" [ref=e347] [cursor=pointer]:
              - /url: /wiki/User_interface_plasticity
            - text: .
            - superscript [ref=e348]:
              - link "[15]" [ref=e349] [cursor=pointer]:
                - /url: "#cite_note-15"
          - generic [ref=e350]:
            - heading "Challenges, and other approaches" [level=2] [ref=e351]: Challenges, and other approaches
            - generic [ref=e352]:
              - text: "["
              - link "edit" [ref=e353] [cursor=pointer]:
                - /url: /w/index.php?title=Responsive_web_design&action=edit&section=1
              - text: "]"
          - paragraph [ref=e354]:
            - text: Luke Wroblewski has summarized some of the responsive and mobile design challenges and created a catalog of multi-device layout patterns.
            - superscript [ref=e355]:
              - link "[16]" [ref=e356] [cursor=pointer]:
                - /url: "#cite_note-16"
            - superscript [ref=e357]:
              - link "[17]" [ref=e358] [cursor=pointer]:
                - /url: "#cite_note-RWD-17"
            - superscript [ref=e359]:
              - link "[18]" [ref=e360] [cursor=pointer]:
                - /url: "#cite_note-18"
            - text: He suggested that, compared with a simple responsive web design approach, device experience or RESS (responsive web design with server-side components) approaches can provide a user experience that is better optimized for mobile devices.
            - superscript [ref=e361]:
              - link "[19]" [ref=e362] [cursor=pointer]:
                - /url: "#cite_note-RESS-19"
            - superscript [ref=e363]:
              - link "[20]" [ref=e364] [cursor=pointer]:
                - /url: "#cite_note-20"
            - superscript [ref=e365]:
              - link "[21]" [ref=e366] [cursor=pointer]:
                - /url: "#cite_note-21"
            - text: Server-side CSS generator implementation of stylesheet languages like
            - link "Sass" [ref=e367] [cursor=pointer]:
              - /url: /wiki/Sass_(stylesheet_language)
            - text: can be part of such an approach. Google has recommended responsive design for smartphone websites over other approaches.
            - superscript [ref=e368]:
              - link "[22]" [ref=e369] [cursor=pointer]:
                - /url: "#cite_note-22"
          - paragraph [ref=e370]:
            - text: Although many publishers have implemented responsive designs, one challenge for responsive design adoption was that some
            - link "banner advertisements" [ref=e371] [cursor=pointer]:
              - /url: /wiki/Web_banner
            - text: and videos were not fluid.
            - superscript [ref=e372]:
              - link "[23]" [ref=e373] [cursor=pointer]:
                - /url: "#cite_note-23"
            - text: However,
            - link "search advertising" [ref=e374] [cursor=pointer]:
              - /url: /wiki/Search_advertising
            - text: and (banner)
            - link "display advertising" [ref=e375] [cursor=pointer]:
              - /url: /wiki/Display_advertising
            - text: came to support specific device platform targeting and different advertisement size formats for desktop, smartphone, and basic mobile devices. Different
            - link "landing page" [ref=e376] [cursor=pointer]:
              - /url: /wiki/Landing_page
            - link "URLs" [ref=e377] [cursor=pointer]:
              - /url: /wiki/URL
            - text: have been used for different platforms,
            - superscript [ref=e378]:
              - link "[24]" [ref=e379] [cursor=pointer]:
                - /url: "#cite_note-24"
            - text: or
            - link "Ajax" [ref=e380] [cursor=pointer]:
              - /url: /wiki/Ajax_(programming)
            - text: has been used to display different advertisement variants on a page.
            - superscript [ref=e381]:
              - link "[25]" [ref=e382] [cursor=pointer]:
                - /url: "#cite_note-SSDD-25"
            - superscript [ref=e383]:
              - link "[17]" [ref=e384] [cursor=pointer]:
                - /url: "#cite_note-RWD-17"
            - superscript [ref=e385]:
              - link "[26]" [ref=e386] [cursor=pointer]:
                - /url: "#cite_note-26"
            - text: CSS tables permitted hybrid fixed and fluid layouts.
            - superscript [ref=e387]:
              - link "[27]" [ref=e388] [cursor=pointer]:
                - /url: "#cite_note-27"
          - paragraph [ref=e389]:
            - text: There have been many ways of validating and testing responsive web designs,
            - superscript [ref=e390]:
              - link "[28]" [ref=e391] [cursor=pointer]:
                - /url: "#cite_note-28"
            - text: ranging from mobile site validators and mobile emulators to simultaneous testing tools like
            - link "Adobe Edge Inspect" [ref=e392] [cursor=pointer]:
              - /url: /wiki/Adobe_Edge_Inspect
            - text: .
            - superscript [ref=e393]:
              - link "[29]" [ref=e394] [cursor=pointer]:
                - /url: "#cite_note-29"
            - text: The Chrome, Firefox and Safari browsers and developer tools have offered responsive design viewport resizing tools, as do third parties.
            - superscript [ref=e395]:
              - link "[30]" [ref=e396] [cursor=pointer]:
                - /url: "#cite_note-30"
            - superscript [ref=e397]:
              - link "[31]" [ref=e398] [cursor=pointer]:
                - /url: "#cite_note-31"
          - generic [ref=e399]:
            - heading "History" [level=2] [ref=e400]
            - generic [ref=e401]:
              - text: "["
              - link "edit" [ref=e402] [cursor=pointer]:
                - /url: /w/index.php?title=Responsive_web_design&action=edit&section=2
              - text: "]"
          - note [ref=e403]:
            - text: "Further information:"
            - link "History of the World Wide Web" [ref=e404] [cursor=pointer]:
              - /url: /wiki/History_of_the_World_Wide_Web
            - text: and
            - link "Web 2.0" [ref=e405] [cursor=pointer]:
              - /url: /wiki/Web_2.0
          - paragraph [ref=e406]:
            - text: The W3C specification of HTML+ stated that websites have to be rendered according to the user preferences.
            - superscript [ref=e407]:
              - link "[32]" [ref=e408] [cursor=pointer]:
                - /url: "#cite_note-32"
            - text: The customization of web page layout was lacking however. Many web developers resorted to ordinary HTML tables as a way to customize the layout and bring some basic responsiveness to their websites at the same time.
          - paragraph [ref=e409]:
            - text: First major site to feature a layout that adapts in a non-trivial manner to browser viewport width was
            - generic [ref=e410]:
              - link "Audi" [ref=e411] [cursor=pointer]:
                - /url: /wiki/Audi
              - text: .com
            - text: launched in late 2001,
            - superscript [ref=e412]:
              - link "[33]" [ref=e413] [cursor=pointer]:
                - /url: "#cite_note-33"
            - text: created by a team at
            - link "Razorfish" [ref=e414] [cursor=pointer]:
              - /url: /wiki/Razorfish_(company)
            - text: consisting of Jürgen Spangl and
            - link "Jim Kalbach" [ref=e415] [cursor=pointer]:
              - /url: /w/index.php?title=Jim_Kalbach&action=edit&redlink=1
            - text: (information architecture), Ken Olling (design), and Jan Hoffmann (interface development). Limited browser capabilities meant that for Internet Explorer, the layout could adapt dynamically in the browser whereas, for Netscape, the page had to be reloaded from the server when resized.
          - paragraph [ref=e416]:
            - text: Cameron Adams created a demonstration in 2004.
            - superscript [ref=e417]:
              - link "[34]" [ref=e418] [cursor=pointer]:
                - /url: "#cite_note-34"
            - text: By 2008, a number of related terms such as "flexible", "liquid",
            - superscript [ref=e419]:
              - link "[35]" [ref=e420] [cursor=pointer]:
                - /url: "#cite_note-35"
            - text: "\"fluid\", and \"elastic\" were being used to describe layouts. CSS3 media queries were almost ready for prime time in late 2008/early 2009."
            - superscript [ref=e421]:
              - link "[36]" [ref=e422] [cursor=pointer]:
                - /url: "#cite_note-36"
            - text: Ethan Marcotte coined the term responsive web design
            - superscript [ref=e423]:
              - link "[37]" [ref=e424] [cursor=pointer]:
                - /url: "#cite_note-37"
            - text: —and defined it to mean fluid grid / flexible images / media queries—in a May 2010 article in
            - link "A List Apart" [ref=e426] [cursor=pointer]:
              - /url: /wiki/A_List_Apart
            - text: .
            - superscript [ref=e427]:
              - link "[1]" [ref=e428] [cursor=pointer]:
                - /url: "#cite_note-fluid_grid-1"
            - text: "He described the theory and practice of responsive web design in his brief 2011 book titled Responsive Web Design. Responsive design was listed as #2 in Top Web Design Trends for 2012 by"
            - link ".net magazine" [ref=e429] [cursor=pointer]:
              - /url: /wiki/.net_(magazine)
            - text: after
            - link "progressive enhancement" [ref=e430] [cursor=pointer]:
              - /url: /wiki/Progressive_enhancement
            - text: "at #1."
            - superscript [ref=e431]:
              - link "[38]" [ref=e432] [cursor=pointer]:
                - /url: "#cite_note-38"
          - paragraph [ref=e433]:
            - link "Mashable" [ref=e434] [cursor=pointer]:
              - /url: /wiki/Mashable
            - text: called 2013 the Year of Responsive Web Design.
            - superscript [ref=e435]:
              - link "[39]" [ref=e436] [cursor=pointer]:
                - /url: "#cite_note-mashable_2013-39"
          - generic [ref=e437]:
            - heading "Related concepts" [level=2] [ref=e438]
            - generic [ref=e439]:
              - text: "["
              - link "edit" [ref=e440] [cursor=pointer]:
                - /url: /w/index.php?title=Responsive_web_design&action=edit&section=3
              - text: "]"
          - note [ref=e441]:
            - text: "See also:"
            - link "Unobtrusive JavaScript" [ref=e442] [cursor=pointer]:
              - /url: /wiki/Unobtrusive_JavaScript
            - text: and
            - link "Progressive enhancement" [ref=e443] [cursor=pointer]:
              - /url: /wiki/Progressive_enhancement
          - paragraph [ref=e444]:
            - text: Mobile-first design and
            - link "progressive enhancement" [ref=e445] [cursor=pointer]:
              - /url: /wiki/Progressive_enhancement
            - text: are related concepts that predate responsive web design.
            - superscript [ref=e446]:
              - link "[40]" [ref=e447] [cursor=pointer]:
                - /url: "#cite_note-40"
            - text: Browsers of basic mobile phones do not understand JavaScript or
            - link "media queries" [ref=e448] [cursor=pointer]:
              - /url: /wiki/Media_queries
            - text: ", so a recommended practice was to create a basic web site and enhance it for"
            - link "smartphones" [ref=e449] [cursor=pointer]:
              - /url: /wiki/Smartphone
            - text: and
            - link "personal computers" [ref=e450] [cursor=pointer]:
              - /url: /wiki/Personal_computer
            - text: ", rather than rely on"
            - link "graceful degradation" [ref=e451] [cursor=pointer]:
              - /url: /wiki/Graceful_degradation
            - text: to make a complex, image-heavy site work on mobile phones.
            - superscript [ref=e452]:
              - link "[41]" [ref=e453] [cursor=pointer]:
                - /url: "#cite_note-41"
            - superscript [ref=e454]:
              - link "[42]" [ref=e455] [cursor=pointer]:
                - /url: "#cite_note-Firtman-42"
            - superscript [ref=e456]:
              - link "[43]" [ref=e457] [cursor=pointer]:
