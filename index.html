<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#dc2626" />
    <meta name="description" content="Disaster reporting and emergency coordination for Camarines Norte, Philippines" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preload" href="/fonts/Switzer-Regular.woff" as="font" type="font/woff" crossorigin />
    <link rel="preload" href="/fonts/Switzer-Semibold.woff" as="font" type="font/woff" crossorigin />
    <link rel="preload" href="/fonts/Switzer-Bold.woff" as="font" type="font/woff" crossorigin />

    <style>
      .custom-cluster-icon { background: transparent; }
      .cluster-marker-inner {
        width: 44px;
        height: 44px;
        background: #3b82f6;
        border: 3px solid white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 14px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      }
      .custom-report-icon { background: transparent; }
      .custom-report-icon > div {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 2px solid white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        transition: transform 0.15s ease;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
