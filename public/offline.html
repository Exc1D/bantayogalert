<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You are offline | Bantayog Alert</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Arial", sans-serif;
        background: #020617;
        color: #f8fafc;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(220, 38, 38, 0.28), transparent 32%),
          linear-gradient(180deg, #020617 0%, #0f172a 100%);
      }

      main {
        width: min(92vw, 32rem);
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 2rem;
        background: rgba(15, 23, 42, 0.88);
        padding: 2rem;
        box-shadow: 0 32px 80px rgba(2, 6, 23, 0.45);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: 2rem;
      }

      p {
        margin: 0 0 1rem;
        line-height: 1.7;
        color: #cbd5e1;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 0.5rem;
        border-radius: 999px;
        background: #dc2626;
        color: #fff;
        text-decoration: none;
        padding: 0.85rem 1.4rem;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>
        Bantayog Alert could not reach the network. Reopen the app or refresh
        this page once connectivity returns.
      </p>
      <p>
        If you were submitting a report, any queued submission saved on this
        device will retry automatically after reconnection.
      </p>
      <a href="/">Return to Bantayog Alert</a>
    </main>
  </body>
</html>
